body:
  text: 愚庵俍亭淨挺著同門朱升淨儲吳百朋淨琬閲略序相國裴休云統衆德而大備爍羣昏而獨照故曰圓覺圭峯密公親承荷澤究一雨之所霑窮五教之殊致因為之疏云爾圭峯序曰專一氣而致柔修一心而成道沖虗妙粹炳煥靈明德用無邊皆同一性性起為相境智歷然蓋種種幻化生於覺心幻盡覺圓心通法遍所謂空不生華金無重礦者矣一言之下心地開通一軸之中義天朗耀極思研精以傳來學真歇悟空中峯普應並有偈頌各殊妙挺慚固陋更為短言用連珠體有宗有因有喻末仍頌云神通大光明藏不二隨順現諸淨土蓋聞圓極則智湛淵澄覺滿則光瑩朗徹何則以明覯物者明麗於空攝物入明者物合其照是以重暉耀夜無間阻深千珠納光必窮郛廓頌云黃鶴樓鸚鵡洲漢陽此去正優遊磨磚作鏡千古使人愁祖師家慣饒舌説道吾心似秋月白中黑黑中白亡與未亡光境何物文殊菩薩章蓋聞六虗本淨非塵纍之可攖一道澄清豈見網之得及何則返原契性性不能覆其纖微鑑盡彌空空無所遁其餘影是以天池皎皎必無假於投珠舜若濛濛抑奚嫌於墮葉蓋聞情生境納舉不出乎內心體變事懸率相緣於塵慮何則死生形役者心非其心來往道殊者慮匪其慮是以張弧之見鬼載一車齊物之談雞懸三足蓋聞得全於覺者夢偽所不能誵得全於天者人損所不能入何則神還其漠故恬以頤和德儷於常故湛以表素是以鈞天之奏不聞舉國而謀華胥之遊豈復乘雲而拜頌云三世諸佛不知有金毛獅子變作狗黧奴白牯却知有笑煞曹山好顛酒文殊文殊出乖露醜第二月第二月古人且要問畢竟是第幾月普賢菩薩章蓋聞式周元始者觀在象先廓落塵埃者灼居域外何則行披披而從幻豈歷幻以求真紛總總之非真固了真而是幻是以乘風白絮無翼而飛入壑黃雲絶迹而走蓋聞物之生也非物故雖生而不生道之化也非道故及化而逾化何則析體則離膚寸之庸觀空則無絫黎之積是以燧人秉御劫有沉灰火正耀靈林無堅木蓋聞駕神龍以奠極不逐方隅整羲馭以規天應離躔次何則無為者無所不為一治者不復更治是以塗山之國石女生兒汾河之濵老人搏影頌云空悠悠空悠悠誰説金星現到頭灰飛煙滅彼此一齊休幻人撫掌呵呵笑幻法從來多巧妙南山虎咬大蟲東海鯉魚𨁝跳有照有用有玄有要普眼菩薩章蓋聞住無可住者心擬涉而路窮思無可思者口欲緣而辭喪何則望虗空以測影徒益觀摹叩寂寞以求音用勞瞻歎是以千年蓮葉必有元龜之毛萬里桂輪豈聞燋兔之角蓋聞積物物而成我故物在我中析我我而歸物故我周物外何則知吾之非我者必對境而如遺觀道之即物者抑舉量而自足是以秦臺之鏡照照靡虧隋侯之珠光光比耀蓋聞總經途之智則區域不殊超形有之觀則神字睟溢何則并慮故可任其分兩行故並忘其一是以鐙王攝影能生虗室之明瞳子舒光遂折若華之照頌云牟尼珠今始識如來藏裏收不得象罔遇之而若存若亡二龍爭之而不出不入絳雪帶玄烏雞非黑秋清一片白如練過影仙人掩團扇薦不薦打破鏡來與汝相見金剛藏菩薩章蓋聞澄源本寂而濁智亂其渟泓古炬彌空而蓬心發其頑焰何則道殊動止者必非一致之揆情存去來者中有不全之數是以眶生赤眚垂髮參差目有浮翳水論洄澓蓋聞蕩精玄表者因新故以為居寓形衆流者任方圓於一器何則彼非我也故在廣不亂其羣我猶物也故入紛彌見其獨是以軒轅鑄鼎不雜鉛丹神禹範金未容砂石蓋聞心與道會去離耳目之鄉神與融理超越意言之表何則見所見者不見所不見聞所聞者不聞所不聞是以鷽鳩之足墮於枌榆蚊虻之肩絀於華岱頌云雲駛月運舟行岸移歷落桃華信馬蹄死生路上把手萬山齊休擬議漫思維誰將螢火爇須彌從來金矢法一印印成泥彌勒菩薩章蓋聞物相生而有滋滋者以欲為性物相遇而後聚聚者以愛為命何則影從影者望影而迷其影幻逐幻者非幻亦入於幻是以四生總總比奔車之無定輪大造茫茫猶渴𦦨之匪實相蓋聞任運而適者無動不與道咸稱物為施者嚮方必以矩合何則天人博設始終有以一其趨頓漸依分洪纖無所越其致是以培塿之細可增益於崑崙蹄涔之微亦全納於滄溟蓋聞棄智就愚者用其智寧用其愚捨聖入凡者任其凡不任其聖何則廣已而造其大故逆順有所不拘納物而入於樊故存亡與之為一是以文王醢子哀江漢之臣鄰伊尹烹牛報空桑之魚鱉頌云樓閣門前可奈何相逢拍手笑呵呵一文錢討甚的揭諦揭諦破布袋盛著些波羅波羅疥狗瘋豬盡往南方成佛寒山拾得打從地獄經過説甚麼宗趣頓漸婆婆和和左青原右南嶽一齊是外道天魔好大哥好大哥且與君家唱哩囉清淨慧菩薩章蓋聞參差應迹者非無小大之規玄同一齊者豈有偏全之量何則吹萬則萬莫能該返極則極不言數是以爍迦羅眼渺塵劫而觀空庵摩羅掌曠昭曠以盡類蓋聞情含衆彚非却卑以明尊足蹈大方不守此以遺彼何則澄之不清故淆之不濁推之不去故挽之不來是以迷頭認境徒觀鏡裏之頭標指見月却疑月中之指蓋聞沖沖漠漠者侗乎未孩冥冥蒙蒙者窅焉若喪何則心不隔於有無情奚間於取捨是以春風芻狗嘷徹桃源夜月木雞啼殘玉漏頌云洗臉摸著鼻頭眉毛只在眼上箜篌吹徹鳳凰城珍珠撒遍芙蓉帳説甚的函蓋乾坤截斷衆流隨波逐浪一隊野狐精個個把亡僧禮葬懷州牛喫禾益州馬腹脹石女高歌鐵人弄棒任死生忘得喪六根不具七識不全太煞是逍遙放曠啐啐啐柳絮毛毱滾滾梨華蛺蝶飛飛露柱遭殃燈籠造謗威德自在菩薩章蓋聞理無趨向非建理而設其標也道絶形言非懸道而為之的也何則奚思奚慮者寧矜務於周容寬兮綽兮者亦遊衍於明旦是以大鵬展翼不歷階墀應龍搏雲豈由戶闥蓋聞天宇湛一者返景而符光融廓徹者覽微而鑑何則觀心則官止於符開務則物入其鑑是以土爰稼穡含物化光鏡納重明因時逸豫蓋聞求定者反亂不如無定而亂莫之從也趨明者必昏不如藏明而昏莫之入也何則至人住運與天為遊大覺不言自然成契是以歌管在廟者神降在庭鼓鐘於官者聲聞於外頌云薄伽梵涅槃門門門回互境分明東西南北一路坦然平桃華沒䏶斥鷃來庭不了事弄精魂千年百歲拖個死尸靈驀直去太惺惺玄關鳥道草鞋繩索絆君行荊棘林中運步夜明簾外翻身出頭天外看誰是恁般人須信道從門入者不是家珍辨音菩薩章蓋聞多者一之反而不知即一可以觀多分者合之殊而不知因分逾以得合何則銖銖積之至鈞石則不任其數矣寸寸掄之至微渺則遂鄰於虗矣是以容成辨律而慎審於環中伶倫考音而致齊於谷應蓋聞行周浹於八表彌前後而悉入於房理溟滓於四虗歷險夷而不蹈其迹何則亦趨亦步者示我驅馳無軌無方者超諸援畔是以衡挽之用䇿足而遇王良輪蹄之間舉首而失造父蓋聞望道而赴者一往情移與化俱徂者怡然理順何則無主於中則無以發其志不達於岸則無以和其倪是以翻翻白氎正當任意而消綰綰華巾亦復迎虗而解頌云六六三十六五五二十五趙州無雲門普普化搖鈴金牛作舞禾山打破鼓堪笑堪疑玄沙汝虎蒼天蒼天無事饒冤苦難難難十石芝樹上攤單三復三前三後三鴛鴦枕畔珠淚淨諸業障菩薩章蓋聞物大於己將見物而疑物己大於物亦見己而迷己何則躡形有之迹者必無返身之知沉內景之觀者未免拘墟之智是以孟賁雖勇不舉體膚離朱極明難睹目睫蓋聞超然意表發夷曠於靈襟寂爾中恬任清虗於奧府何則背塵入覺者不知覺即迷塵捨有循空者竊恐空仍滯有是以風行水上何妄非真天在山中指正為倒蓋聞化與化而靡極故體道必忘其玄息與息以相吹故歷物不留其準何則朕雖絶矣而離朕者勿雖慮盡捐矣而遣慮者未遣是以幽人入夜逝魄相尋臘月流澌春冰不泮頌云暗不棲巢明不越戶身雖扄而在途語帶玄而無路但形文彩即屬染污聾者使之聞盲者使之睹堪笑時人邯鄲學唐步命根不斷增長我見輪却他克賓維那一場法戰岐途兮亡羊心不息兮走正狂認賊為子兮喚奴作郎普覺菩薩章蓋聞不囿於物者頽然任運而運與道俱無係於心者嗒焉忘情而情與古會何則未嘗在也未嘗不在也無乎適也無乎不適也是以東山破斧感動風雷西狩獲麟象傳箕斗蓋聞狃於近見必執偏而廢其全習於故聞將取小而遺其大何則作之固非任之亦執其咎止之多失滅之尤罹其殃是以情志之癖倉公憫其可憐膏肓之原醫緩望而却走蓋聞潛神冥極憂樂不以入其懷息意淵微動靜不以干其慮何則泯怨亦因而忘其親絶愛即無所用其憎是以蒼龍臥月漫勞折角之鞭玉馬奔風不窘弄蹄之駕頌云一圭一刀一匕一勺作者好求無病藥漏笊籬破木杓久嚮趙州到來一條略彴綿州附子益州薑大煞大煞曹山病病山病偏不坐偏正不居正不病者來看和尚麼老僧看他有分圓覺菩薩章蓋聞神志專則窮微集逸情慮并則考道鈎玄何則宇泰定而光通心塞淵而闓豫是以耳目靜好三月坐忘商旅不行七日來復蓋聞身居軌物故不戒而心孚性守宮庭故無欲而智正何則非內也非外也收神聽於和平於彼乎於此乎儼帝降於左右是以黃琮蒼璧屢薦郊坼藻火辰星時嚴路寢蓋聞藏天下於天下故在宥者不勞運一心於一心故照臨者不匱何則寓形自物物在而我分之也考道由我我先而物合之也是以箕風畢雨庶徵者皇建之符石隕鷁飛辨類者體元之事頌云九旬休夏為誰忙烹石虎打羚羊迦葉眉毛丈二長剎竿放倒漸漸好商量最上一竅絶玄絶妙泥金剛打拳木羅漢𨁝跳石敢當呵呵大笑東壁葫蘆低聲報道獼猴闖入道場大蟲褁著紙帽賢善首菩薩章蓋聞立言居要非瀚漫不收之言踞論入微豈畢近苟且之論何則言渺衆慮者七十子奉其指歸論攝羣機者五千文入其標準是以泱泱東海河伯望洋嶽嶽岱宗梁父屏息蓋聞羲軒堯禹不嫌接席而謀崆洞廣成豈難望影而赴何則理無殊理故千聖迪於余心文多舊文故羣詞一乎己口是以玄龜入雒無取大撓白馬遊河不勞蒼頡蓋聞非明非暗故在兩有所不居亦白亦玄故履中更失其任何則貴不入聖者賤不趨凡高不守真者卑不背俗是以現身護世嘗持一卷之經息影逃虗不挂半綸之網頌云一函經一函經大地山河努眼睛鏤空出屑畫鬼成文鉢盂枘子重三斤緑楊芳草子規夜半喚聲聲髑髏驚起枯木龍吟天津橋上日午打三更脫殼烏龜嶺外行只憂他雲門拄杖觸著帝天鼻孔雨下盆傾楞嚴答問序昔人閲楞嚴經不解句讀已獲深契則語言道斷文字性離未當求勝諦于恆沙叩妙音于筆授矣俍亭和尚慧本天成思若符契提摩竭之正令盡毗耶之祕藏今日之藥山投子也固將目霄漢以忘言托東臯以長嘯諸方義學持波斯宮掖之文作慶喜袈裟之問于是縱其指揮都成撰述山河大地進琅琊而盡其機一路涅槃起雙峯而畢其義深微集逸旁引曲暢同人奉為剞厥用廣流通從聞聲見性之一門得不歷僧伽之道果是真實了義也是究竟堅固也合掌恭敬而為之序繡水後學曾王孫
