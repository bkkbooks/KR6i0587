body:
  text: 枯宅居士楊師益編敷座而坐拈云當時忽有人大展坐具作禮三拜拂袖便行也許他具一隻眼或喝散大衆掀倒繩床也許他具一隻眼或將老瞿曇一腳踏翻說老老大大作這般行徑也許他具一隻眼云何應住云何降伏其心拈云空生空生囈語作麼好與一頓痛棒趂出在三門外不許相見或者有箇入頭也不見得善哉善哉教壞人家男女應如是住如是降伏其心拈云空生空生錯過一機了也當時若舉起便薦呵呵大笑一場說原來佛法無多子豈不通身慶快不唧𠺕漢更疑他三十年我皆令入無餘涅槃而滅度之拈云老瞿曇口門尚窄也只說得一半狗子便成佛也香臺又作麼生菩薩但應如所教住拈云切忌動著動著三十棒若見諸相非相即見如來拈云法眼云諸相非相即不見如來天童云一箇說如來禪一箇說祖師禪會得甚奇特不會也相許且道會得的也便罷了不會的却怎生相許聻不見道見怪不怪其怪自敗法尚應捨何況非法拈云火爐裏拈取一莖眉毛得麼呀呀墮了也如來得阿耨多羅三藐三菩提耶如來有所說法耶拈云當時空生只合拍手歸衆所謂佛法者即非佛法拈云綿州附子益州薑實無有法名阿羅漢拈云切忌坐在無事甲裏於法實無所得拈云情知情知應無所住而生其心拈云有者道石女起舞木人興歌道得十分諦當了也住住住莫將箇現成句子錯理會他恆河沙拈云好世尊撒泥撒沙迷昧人家眼目隨說是經拈云古人云咳嗽掉臂無非佛事莫不是隨說是經麼知解宗徒未免依文解義了也非般若波羅蜜名般若波羅蜜拈云爪籬木杓與我安放一邊如來無所說拈云老瞿曇直得一時口啞微塵非微塵世界非世界拈云且莫向鬼窟裏作活計三十二相即是非相是名三十二相拈云一棒打殺與狗子喫了也當時如來性命却在別人手裏離一切諸相即名諸佛拈云如何是諸佛出身處東山水上行老韶陽指東話西扭壞他人鼻孔此法無實無虗拈云八角磨盤空裏走錯錯錯話墮了也在在處處若有此經拈云莫眼花好為人輕賤拈云太尊貴生算數譬喻所不能及拈云前三三後三三畢竟是多少果報不可思議拈云燈籠緣壁上天台與他寒山竹筒拾得笤一時向摩耶夫人腹中現身作佛去也還有人信得及麼若信不及三十棒自領出去若信得及三十棒自領出去云何應住云何降伏其心拈云當時好與一喝待他耳聾三日別作商量也不致婆婆和和說箇不了當生如是心拈云五臺山上雲蒸飯十字街前狗矢天剎竿頭上煎䭔子三箇猢猻夜簸錢說即儘說恐太煞了也滅度無量衆生實無衆生得滅度者拈云如何是行鳥道不逢一人又說不行鳥道且道行的是不行的是實無有法發阿耨多羅三藐三菩提心者拈云樹倒藤枯句歸何處了也住住住且與我覓取鉢盂柄來實無有法得阿耨多羅三藐三菩提拈云落空亡的外道請過一邊且莫喚鐘作甕如來者即諸法如義拈云喚作如如早是變了也王老師通身負墮口巴巴道向異類中行一切法皆是佛法拈云雲門乾矢橛洞山麻三斤莫便是這箇道理麼咄錯會不少非大身是名大身拈云頭長三寸頸長一尺畢竟是甚麼人喚取來我要與他相見實無有法名為菩薩拈云金果朝來猿摘去玉花晚後鳳銜歸道伴交肩這裏莫錯認好諸心非心是名為心拈云有者道剎竿頭上仰蓮心分明是這箇也且道你面皮厚多少過去心不可得現在心不可得未來心不可得拈云周金剛好不丈夫被他老婆一問直得口啞若是箇皮裏有血的何不與他餅子一擔打翻福德無故得福德多拈云真園頭作許多癡福著甚來由好與他念法華一齊趂出免得後人說勝說負色身非色身諸相非諸相拈云金香爐下鐵崑崙這裏作何分別若人言如來有所說法即為謗佛拈云掩耳盜鈴漢說法者無法可說拈云聾人爭得聞佛得阿耨多羅為無所得耶拈云當時翻轉面皮痛與一頓儘教扶起沙盆如是如是乃至無有少法可得拈云東瓜直儱侗是法平等無有高下拈云切忌顢頇修一切善法拈云塗污了也即非善法是名善法拈云牛頭出馬頭回乃至算數譬喻所不能及拈云撮空謾語凡夫非凡夫拈云李順王小二烏有先生無是公一齊向水牯牛隊中打殺了三世諸佛也惟有謝三郎不在其內若以色見我以音聲求我是人行邪道不能見如來拈云切忌當面錯過於法不說斷滅相拈云此事不得孤滯然雖枯木糝花要且眼中著屑了也闍黎闍黎放過著菩薩不受福德拈云雖則貧無立錐只恐富嫌千口善現善現且與我拈取華房百寶來無所從來亦無所去拈云釘釘著懸挂著一合相非一合相是名一合相拈云江南三月鷓鴣啼算來只在秋江上且道古人語有差別沒差別聻如是知如是見如是信解不生法相拈云大家吹滅火一路暗中行饒你投明到來也須三十拄杖一切有為法如夢幻泡影如露亦如電應作如是觀拈云牡丹花且置即如柏樹子又作麼生無為法有為法變作兩箇熱鐵丸兒一時穿向金剛鼻孔裏去也具眼人惺惺著雲溪俍亭和尚說心經小序達磨西來以楞伽心宗二語為印維心之為宗旨旨也心經以心標名僅無罣礙之文一見餘俱言空不言心維空之為心體也教中人空法空空空等多言空宗門即心非心諸話又言心不言空多言空者恐人見心不見空也言心不言空者恐人或心外求空也是豈有宗教之殊乎哉俍師茲說心經于標悉文義外逐節以宗門公案話指證此說大行使人讀是經者無一語不可作話頭參究也非惟此經諸經盡然言心言空可言心不言空言空不言心可心與空俱不言可舉三藏十二部統歸宗旨無教相可別因文入悟者世不知當幾人俍師之功未易量也康熙八年冬仲擕李法弟王庭頓首題
