body:
  text: 震旦桑門淨挺著優婆塞徐世淯陳祚昌仝閱問藥師是大乘經否答是也問何遽知為大乘耶答佛告阿難此義甚深唯除一生所係菩薩難可解了又曰諸行聲聞獨覺乘者皆以大乘而安立之以是知其大乘也問既大乘經何故說有為法答舉足下步無非道場一色一香誠哉佛事治世語言資生產業皆與實相不相違背方便善巧何不可耶一向擎拳竪掌指東話西他增上慢一流人全弄虗頭未得謂得未證謂證撥無因果不畏罪福佛也沒奈何他臨末梢頭像法轉時越發信不及了正法住世一千年像法住世一千年塔廟堅固鬬爭堅固今正此時業障所纏塞礙道眼奈何奈何薄伽梵涅槃門有一個方便法兒救度汝等尋常大言不慚說念佛一聲漱口三月西方淨土我不願聞如今不要你生西方即生東方也罷東方世界號淨琉璃亦如西方等無差別只是一件西方極樂即無退轉東方世界亦可生天為轉輪聖王或生人中作國王大臣長者居士多饒財寶富有倉廩威德具足形相端好汝意云何生願樂否求官位耶求富饒耶求男女耶求長壽耶饒你修行不修行說著飲食衣服醫藥臥具所受用物都無盡期十箇有五雙割捨不得更有奇特不但作諸事業隨意所趨乃至三十二相八十隨形直至菩提與他釋迦老子無二無別你還肯好樂麼不是此便是彼不上南便落北尋常說個地獄餓鬼畜生汝都不信他琰魔法王在汝面前有俱生神具說罪福你增上慢人還免得麼一般在人道中王法所加縛戮係閉災難凌逼水溺火焚種種惡獸所噉乃至攣躄背僂白癩顛狂生居下賤為人奴僕汝還甘麼虎狼異類蚰蜒小物且不足言即如牛馬駝驢負重而行無罪無辜受人鞭撻是何道理衛太子許皇后吳楚淮南並以呪詛死者千屬有因果耶無因果耶日月薄融彗孛飛流飢饉頻仍戰爭不息民生其間率多中夭地獄三塗此其較著者也諸大乘經說六度法總為菩薩因緣勸汝布施汝又不肯勸汝持戒汝又不能甚至積集資財破壞軌則一味我慢貢高耑與忍辱相反厭棄多聞與精進反毀敗正見與禪定反于佛所說契經深意不能解了與智慧反一切聲聞緣覺諸小乘法是束縛汝不定的這六度萬行明明大路在汝目前汝又當面錯過一味指空望空胡喝亂道不敬天地不信鬼神可憐生可憐生此一回來失却人身真正救汝不得也泥裏喫跌泥裏洗平常教汝參禪念佛七日為期七日不了再是七日如今業障所纏卒難消遣一日一夜乃至七日七夜禮拜行道念念不可放鬆這八關齋戒關閉一切諸惡增長一切諸善西域有人得生天果目連尊者曾為頻婆娑羅王攝授此戒此土任彥升沈休文諸大英俊以是為入道之基白居易問鳥窠窠曰眾善奉行諸惡莫作你晝夜六時在藥師壇中所為何事然燈續明放生修福畢竟圖度著可意事厭離著不可意事這圖度可意的便是好善一心厭離不可意的便是惡不善一心生慇重心生恭敬心無垢濁心無怒害心七日一心乃至四十九日一心這四十九日中光明不絕便是一盞淨琉璃綿亘十方內外瑩徹了也我如今還說一箇譬喻這琉璃瓶本是光明內外十方無所不照只因黑夜裏失却一隻眼睛無端借些膏火以火生光以膏續火一息不來便暗昏昏一齊不見了諸人要知你四十九日內還有一息不來的時節麼直須念念是處處是時時是如膏續火如火生光淨琉璃打成一片個裏却揀擇不得一毫頭夾帶不得一些子的譬如琉璃若有揀擇便有照有不照了若有夾帶便有亮有不亮了以有所得心修無所得法還以有所得法證無所得心八大菩薩乘空而來示其道路日光遍照月光遍照廣嚴城畔圓陀陀活潑潑古鏡流輝東方西方一齊涉入此所謂𦦨網莊嚴也實際理地不受一塵佛事門中不捨一法你增上慢人慣開大口撥無因果惑亂人畢竟飯是米做塼是土做師姑是女人做因地而倒因地而起頭頭法法了了明明因果歷然理事不二到這裏還信得及麼也不要你參禪也不要你念佛只四十九日禮拜稱誦這藥師經身口意業自然清淨多生罪障累劫冤牽一時氷釋了也悟與不悟了與不了且漫商量洒洒落落做一個光明潔淨有道的人多少受用三塗地獄自然羈絆汝不著了佛昔本願與汝同證菩提斷不欺汝況復四大天王十二藥叉與一切天龍鬼神共相擁護豈不快哉豈不快哉一切不修行人諸惡鬼神奪其精氣一切修行人天龍神等所共護持福善禍淫斯理不爽天神人鬼儒典有之益知此大乘經文不可謗毀矣還有數問鴛崛托鉢有一女人臨當產時受於極苦為甚不持此經一時轉女成男去曇照禪師命終乃云閻羅王來拿我也莫不是彼王推問麼師子受戮二祖往鄴都橫被王法當亦名為抂死麼如何如何玄沙道盲聾喑啞三種病人接伊不得果是障緣深重耶溈山水牯牛南泉水牯牛帶角披毛隨路而行罪過不少馬祖不安院主入問日面佛月面佛莫不是日光遍照月光遍照麼諸仁者除却善男子善女人為他鄔波索迦鄔波斯迦更立一名除却疑神樂神八部等神為他徤達縛阿素洛揭路荼緊捺洛等別安一義何如速道速道
