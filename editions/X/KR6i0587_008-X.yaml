body:
  text: 西溪俍亭挺著同學吳山濤戴斑立仝閱問如來說法四眾臨筵為甚麼彌陀會中比丘尼優婆夷以及人非人等一齊不到答成佛久矣頌清淨從來無女人畜生那敢並追尋獨憐共命頻伽鳥古佛光中再現身問迢迢十萬乃是西方為甚又說箇惟心淨土答不信長安在日邊頌白鷺池邊半畝居綠楊兩岸間芙蕖怪他無限癡男女奔走迢迢十萬餘問彌陀佛今現在是果然麼答錯過不少頌古佛過去久矣快把淨瓶扶起分明渡水逢渠原來是姓張的老李問極樂國土清淨有餘說什麼硨磲碼瑪答暴富貧兒自古多頌釋迦貧迦葉富玉泉皓前世不修打倒了葡萄棚留得一條布褲阿逸多阿逸多太無厭生討個大光錢認主顧問東方不動地瑠璃光菩薩亦與西方無勝世界安養一般為甚麼落日懸鼓耑以生西為念答切忌指東話西頌一為遷客去長沙西望長安不見家黃鶴樓中吹玉笛江城五月落梅花問妙華供養遍往十方仍以須臾還至本國莫是神足通麼答不許夜行投明須到頌驢兒三脚弄蹄行木馬臨風吼幾群無足鐵牛連夜走看煞區區沒眼人問孔鸚鵡演暢法音喚他作畜生得麼答雖行畜生行不得畜生報頌燕子飛燕子飛何處黃鶯帶雨啼更杜䳌流血雙雙瓦踏破柔荑問寶樹出音使人念佛無情說法在在有之是果然否答燈籠拍手笑呵呵頌燈籠拍手露柱開口八角磨盤空裏走喫不盡沽來酒說甚麼趙州無常州有切忌切忌播揚家醜問人民國土無量僧祇成佛以來今止十劫然則十劫以前當不得名為極樂也答春風是處馬蹄香頌無量阿僧祇劫怪道不生不滅東風搖曳柳絲長三箇烏龜證箇鱉果然是秤錘嚼鐵問補處稱尊獨許一生授記為甚麼有餘方便令他凡聖同居答未容揀擇頌一箇兩箇千萬箇海壇馬子似驢大烏梅結網打蜻蜓師姑原是女人做問不到西方必愁退轉釋迦彌勒何為睹吏陀天答珊瑚枝枝撐著月頌溪西鷄齊啼屋北鹿獨宿不是上天堂便是落地獄雪山六載何曾出家少室九年也未離俗問一心不亂即得往生古人道生則必定生去則實不去是否答到頭雲定不離山頌天地只爾戶庭已悠世與我以相遺復駕言兮焉求老僧百年後山前檀越家變一頭水牯牛問東方舌相遍覆大千且問南西北方上下再來作何安置答如影投影頌不是心不是佛不是物古往今來窮不徹韶陽老得一橛擬思量沒交涉昨夜門前流水聲癡人喚作廣長舌問一切諸佛同知護念為甚麼觀音勢至獨號當機答冤有頭債有主頌掐數珠修行下坡不走晝夜六時披枷帶肘一笑歸來何所有三三成一九兩個黃鸝鳴翠柳問子憶母母憶子啐啄同時為甚麼又道作家不啐啄答真誠不是小兒嬉頌子啐母母覺子鷇觀音彌勒太煞婆心牛頭夜义寒威卓朔咄咄老鼠哥哥入牛角問娑婆教主能忍能行與彼阿彌陀如來畢竟誰君誰臣誰賓誰主答向時奉奉時向頌娑婆極樂教中王此土他方任主張但得主賓齊一致莫教行旅往來忙金剛隨說并般若別傳序盧行者悟無住生心得法黃梅為青原南嶽之祖固知金剛般若一字一句有由也余過河渚造雲溪讀語錄盈尺嘆未曾有及閱金剛隨說并般若別傳使我毛骨並爽心目俱開竹林精舍去此非遙拈華微笑儼然未散頂門具眼舍雲溪其誰屬耶昔德山遇婆子焚青龍疏鈔道重海內乃今得俍和尚者有句無句雙眼圓明黃梅衣鉢他人不敢與爭烈烈千古矣時康熈六年夏至日禹航同學弟嚴沆拜手題
