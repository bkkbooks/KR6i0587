body:
  text: 雲棲後學淨挺著王庭言遠陳之遵靖菴同閱般若波羅蜜多心經般若翻智慧波羅蜜多翻彼岸到五時說教般若在第四時所謂熟酥也說般若四處一靈鷲山二給孤獨園三他化天宮四竹林園白露池般若經十部大般若部六百卷此為某心猶楞嚴蜜部以多羅吽泮等語為陀羅尼心耳六波羅蜜般若最勝經者修多羅也僧問智門如何是般若體門云蚌含明月如何是般若用門云玉兔懷胎是波羅蜜不是波羅蜜聻參觀自在菩薩菩提薩埵謂覺有情也過去正法明如來現前觀世音菩薩三十二應身十四無畏法初於聞中入流忘所聞所聞盡覺所覺空得無量三昧若將耳聽終難會眼裏聞聲便得知稱觀世音明六根互用耳將錢來買胡餅却是饅頭又作麼生且道自在否行深般若波羅蜜多香象渡河非兔馬跡譬如入水乃見長人般若是甚深智行般若是甚深行舉足動步般若現前儒者所謂知行合一也檀波羅蜜尸波羅蜜羼提波羅蜜毗離耶波羅蜜禪那波羅蜜乃至行波羅蜜願波羅蜜方便波羅蜜智波羅蜜都收歸在般若波羅蜜如何行聻說得一丈不如行得一尺說得一尺不如行得一寸時時節若至其理自彰照見五蘊皆空色受想行識謂之五蘊五蘊山頭一段空道盡了也如鏡現像謂之照圓明了知見猶離見前陰後陰空中陰亦空三際斷者五蘊悉空比琉璃瓶內外明徹幻師作幻人無有識神現男女相師子尊者遇罽賓國王已得蘊空一場好看且問罽賓國王是作家不是作家度一切苦厄憂愁怨惱為苦疾病災難為厄本體無情都忘逆順代一切眾生受諸苦厄度一切眾生離諸苦厄在地獄中有三禪天樂汝還甘麼苟或不甘把髻投衙莫謂不道舍利子般若部中鶖子當機以智慧第一故仰山香嚴過於鶖子是否色不異空若取是色云何非空何以故色無自性故空不異色當體本空何妨現色彼太虗空不礙羣相所發揮故色即是空色即是空非色滅空白水云色不自色喚甚麼作色空即是色若執是空空還成色色空本際無二無餘受想行識亦復如是色是外陰受想行識是內陰蘊結之初由內漸及消融之次自外旋除堅凝妄想為劫濁虗明妄想為見濁融通妄想為煩惱濁幽隱妄想為眾生濁顛倒妄想為命濁由顛倒故有遷流由遷流故生煩惱由煩惱故成領納由領納故為劫波增劫滅劫長劫短劫種種不實盡同虗空彼質礙相尚如是矣況其餘耶受想行識從無體性虗空變滅虗空往來若留滯者正如以手摩撮虗空無有是處舍利子頻呼小玉是諸法空相非有相非無相非非有非無相非亦有亦無相是諸法空相聲聞辟支佛祇證人空不證法空法無有法法法非法一法該一切法故名諸法諸法不相知諸法不相到不生不滅生滅以體言從無有生云何得滅有為是生滅法無為是不生滅法生滅滅已寂滅現前白雲終日倚青山總不知兩個泥牛鬬入海直至如今沒消息不垢不淨垢淨以土言娑婆是垢極樂是淨足指按他現前西方誰垢誰淨純清絕點似鏡常明未免真常流注也打破鏡來這裏說淨併不得不增不減增減以時言以數言增至八萬四千歲減至十歲增至阿僧祇劫阿僧祗剎減至剎那一微塵許老僧拄杖子還容你增減麼這竿竹恁般短那竿竹恁般長隨分納些些一總增減不得是故空中無色火爐裏擇取一莖眉毛得麼直至虗空粉碎大地平沈青赤諸色一時不現無受想行識七地菩薩入受想滅定受想不行八地以還行無遷流識情斷矣大千壞時無有不壞不聞爛壞虗空無眼耳鼻舌身意五陰六入十二處十八界悉如來藏眼等六根遂為六入所見色與盲等所聞聲與聾等乃至受諸法不分別故云無也還知無舌人解語無手人行拳麼喚取穿雲木童問他消息無色聲香味觸法此明十二處也色本殊質像聲原異苦樂香味觸法種種皆然然此一一依根分布到得和根倒斷不立纖塵色不到眼聲不到耳春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少色聲外一段威儀非其人不易語也無眼界乃至無意識界此明十八界也眼耳鼻舌身意是六根界色聲香味觸法是六塵界根塵相對於中識生眼識界乃至意識界是六識界生酥言八識熟酥但言六識此不言八識者法味異故五識皆帶質境六識兼獨影境騎虎入蟻穴是意識界非前種種識界儒者謂意之所在即為物是意識界也十八界空十八界都離想相三脚驢子弄蹄行脫彀烏龜緣壁走還在界內聻還在界外聻無無明亦無無明盡乃至無老死亦無老死盡為緣覺人說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲非惱無明滅則行滅乃至生滅則老死滅盡即滅也約三世因果說無明與行是過去因識及於受是現在果愛取兼有是現在因生緣老死是未來果約一世說則無明乃至老死六根門頭一齊併現究竟一境一念展轉相成一剎那間靡不畢受經云隨事貪欲與心共生心是識事是行於行迷惑是無明與無明及心共生是名色名色增長是六處六處三分合為觸觸共生是受受無厭足是愛愛攝不捨是取彼諸有支生是有有所起名生生熟為老老壞為死三世耶一世耶諸經說十二因緣者最多茲不繁引知麼知麼此事如擊竹相似一節破則節節破矣正恁麼時多生習氣歷劫無明一時斷壞有什麼生緣老死礙絆得他香嚴一擊忘知水潦被馬祖一踏踏倒起來呵呵大笑死生路上何等逍遙說緣覺法即不中也無苦集滅道為聲聞人說四諦法知苦斷集證滅修道阿含等部舌敝耳聾今日乃知著敝垢衣執持糞器是方便力非誠諦語尚無有樂云何有苦無有係離云何積集無有去來云何壞滅五根五力七覺支分八聖道分三十七品助道之法都為剩義矣如何是道見通車馬如何是道十字街頭休斫額呀錯過了也無智亦無得為諸菩薩說六度萬行法六度以智為本智波羅蜜般若波羅蜜如鏡發光非一非異以有所得心說有所得法是名為得若菩提者則無所得經云無有智慧於中畢竟無得又云若無所得則無取捨又云無所得而得老僧忘前失後去也百不知百不會門前石敢當少分相應逢人不得錯舉以無所得故實無有法得阿耨多羅三藐三菩提者說甚有所得耶達摩老子踏空而來踏空而去藥山在石頭處如蚊子上銕牛以無所得故菩提薩埵實無有法名為菩薩菩提薩埵但假名稱如來說為真是菩薩依般若波羅蜜多故心無罣礙小智不及大智小年不及大年菩薩智如來智是有分別耶無分別耶有罣礙心有無罣礙心肉團心緣慮心集起心堅實心是罣礙心廣大心甚深心方便心堅固心無間心折伏心善巧心不二心無礙心圓明心是無罣礙心不著有亦不著無故無罣礙虗空安汝心內猶如片雲點太清裏我自覔心了不可得於義云何無罣礙故無有恐怖憂懼為恐驚懼為怖境未至則懷恐境已至則生怖心無所著如雲行月駛虗舟飄瓦花鳥逢木人木人見花鳥得無畏法常善勝敵是真師子遠離顛倒夢想我今不知何者為正何者為倒是名顛倒夢升兜率夢遊華胥此謂為夢足先朘軟口中液生此謂為想顛倒夢想俱無有根無始積習為所緣故今既遠離離幻即覺矣住住住潘郎倒騎驢即不問還我無夢無想時主人公來究竟涅槃涅槃有異彼諸外道或謂火滅風止是為涅槃或謂性或謂非性或謂知性非性而作涅槃或見有覺與涅槃差別而作涅槃總二十三種非為究竟小乘涅槃斷煩惱障未斷所知障離分段生死未離變易生死非為究竟大乘涅槃四住地煩惱已盡五住地煩惱未盡非為究竟自性清淨涅槃半是凡夫半是聖人非為究竟此菩薩究竟涅槃直至等妙二覺入無餘涅槃不盡有為不住無為涅槃生死自在遊行方得名為彼岸到也還有一說十方薄伽梵一路涅槃門乾峰雲門二俱不了畢竟如何以柱杖一時趕散三世諸佛三世諸佛在火𦦨裏轉大法輪被他白牯黧奴一時推倒且問白牯黧奴為甚麼却知有三世諸佛為甚麼却不知有聻試辨別看依般若波羅蜜多故得阿耨多羅三藐三菩提世尊成等正覺龍女成等正覺廣額屠兒成等正覺五百弟子成等正覺一切眾生成等正覺乃至山河大地情與無情成等正覺是有差別麼若無差別為甚麼黃面瞿曇指天指地誇口道天上天下唯我獨尊是個什麼道理故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪脩多羅是顯義陀羅尼是密義顯故華梵合詮密故但用梵語婆婆和和有句無句華耶梵耶般若不翻非有智非無智非解脫非法身波羅蜜不翻不此岸不彼岸不此岸住不彼岸住不中道住顯耶密耶知之者鮮矣風神雷神水神火神林神地神未為大神日明月明燈明未為大明空處最上識處最上無所有處最上非想非非想處最上未為無上一微塵等眾微塵等須彌等芥子等無邊剎海等十世古今等佛菩薩等眾生等未為無等等是大神呪是大明呪是無上呪是無等等呪華嚴會上說個阿字法門這裏不消重舉能除一切苦苦苦壞苦行苦是為三苦生老病死苦求不得苦怨憎會苦愛別離苦五陰熾盛苦是為八苦大末蟲處處能緣惟不能緣於火𦦨之上煩惱處處著惟不能著於般若之上般若現前如火消冰一切壞滅有何不除斷耶雲門普玄沙虎禾山好打鼓良久云太乙救苦真實不虗惟此一事實餘二即非真真語者實語者此法無實無虗於是中無實無虗諦聽諦聽良久云眉毛墮也故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩摩訶揭以顯示為義諦以誠實為義華梵合也波羅即彼岸到也僧者和合菩提薩者覺也摩訶大也意義可了乃彈指一下云專伸回回
