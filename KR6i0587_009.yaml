body:
  text: 禹航顥亭居士嚴沆閱黃面老子婆婆和和說金剛般若波羅蜜也不較多傅大士講金剛經揮尺一下也不較少中間此彊彼界定一十八住設二十七疑判三十二分雖則各逞胸臆要且同門出入雲溪抑不得已塗污古人不免胡亂一上好個世尊著衣持鉢面目宛然不起於座說法已竟當時空生出眾大展坐具作禮三拜急請諸人著眼豈不快便難逢可惜許忍俊不禁多口道個希有希有且道如何是他希有處經中明言如來者即諸法如義又云如來者無所從來亦無所去又云聲求色見不見如來一幅倪雲林白描山水中間人影也不見一個却是多少巧妙多少奇特諸仁者且莫錯過洞山辭雲巖問百千後誰邈師真巖云祇這是後有僧問洞山只如雲巖道祇這是意旨何如山云我當時幾錯會先師意諸仁者莫錯會好空生是一尊青龍陀佛特特而來未免入他保社也指望搭箇東瓜印子所以說善護念諸菩薩善付囑諸菩薩五百弟子眼巴巴的法華會上授記不遠了且住且住經中明言實無有法名為菩薩誰當護念誰承付囑然雖如此功不浪施為發大乘者說為發最上乘者說開口便說菩薩非復吳下阿蒙跛鱉盲驢一般行徑所以說通達無我法者真是菩薩又說知一切法無我得成于忍此菩薩勝前菩薩只無我二字四相根原一齊都斷絕也諸仁者過去心不可得現在心不可得未來心不可得遭他婆子一問直是開口不來說甚發菩提心早是錯也住個什麼降個什麼弄泥團漢有甚了期老瞿曇將錯就錯笑臉相迎垂下一個鈎子贊歎不迭道善哉善哉阿蘭那行被他迷昧不少却順口答他道如汝所說發菩提心如是住如是降伏借婆衫子拜婆年不傷物義問個八兩還他半觔何等現成何等慶快後來說如是知如是見如是信解發菩提心一場話端纔得了畢中間印證空生一則曰如是如是再則曰如是如是三則曰如是如是一大藏教劈頭安個如是我聞剛被空生搔著庠處和贓捉敗赤心片片滿口淋漓為他又安兩個註脚度眾生却無眾生無我無人故無眾生無眾生故無壽者如是降伏布施不受福德以福德無故不受福德不住相布施故不受福德如所教住應無所住是半句應無所住而生其心是全句此云無住布施一點水墨兩處成龍却又下個探頭云可以身相見如來不於意云何是探竿是影草祇園會中慣得其便只此藥頭儘用到底直得水盡山窮弓斷矢折母啐子機境相投這也不為辜負諸相非相即見如來猩猩與汝相見了也問答已畢空生晏坐多時是點頭會腦的便信得及如是言說如是章句驀起大心為他眾生更伸一問一念淨信具諸福德遠離四相是不待言且併法與非法兩頭坐斷經中法相雙舉先拋相後拋法為他空生是個知有的人全坐在非法一邊法便拋了非法一邊貼肉布衫最拋不下所以說個法尚應捨何况非法諸仁者如來開口說得一兩行經何處分章何從摘句空生大驚小怪便云得聞如是言說章句是無說說即是不聞聞耶有所說法耶無所說法耶瞿曇此處急下一竿將一個阿耨多羅弄成熟鐵丸子令他吞吐不得空生隱隱的尚有一物掛在胸中一時還放不下按著膽說個無有定法也只依樣葫蘆說非法非非法而已心問口口問心卜度將來一切賢聖皆以無為法而有差別三賢十聖差別宛然據他見處全靠在法身邊那得個透法身句子如來輕施一拶把從前所說福德放過那邊却將阿耨多羅併與此經一齊拈起趂口快說個佛法者即非佛法文殊普賢起佛見法見貶向二鐵圍山且問他十聖三賢向何處安身立命須陀洹非須陀洹斯陀含非斯陀含阿那含非阿那含阿羅漢非阿羅漢空生已證人空他實實信得及的只因他黃面老粧模作樣說個天上天下唯我獨尊又說然燈佛與我授記作佛却疑別有被他如來一眼觀破急處施嵩空生見路便行直下道個於法實無所得百千三昧無量法門向一毫頭上一時穿却雖然如此法華會上各各授記各各莊嚴五百箇沒緊要的禪和打作一團終日癡心妄想空生欄頭一問護念付囑不免走入這伙伴裏如來因行棹臂打破沙盆說莊嚴即非莊嚴癡人面前不得說夢前說無住布施是半句此說無住生心是全句神通妙用運水搬柴鳥棲無影樹花發不萌枝六塵門頭親切受用黃梅家法剛被盧行者一擔承當也只在般若部裏拾得一句陳言當作家寶諸仁者受持讀誦一句半句也儘彀了何況四句偈耶第一希有那可追尋非心說心非身說身非文字說文字不得已安個經名非般若波羅蜜名般若波羅蜜且道以何為金剛耶帝釋宮中之寶薄劣眾生所不能見世尊哆哆羅羅說了一上畢竟說些什麼來諸仁者莫眼花微塵合為世界世界碎為微塵大中現小小中現大不可以身相見乃可以三十二相見耶涕淚悲泣深解義趣如是之經既離色相復絕名言摩尼寶藏稱引徒繁白鷺池邊口門尚窄生實相者即是非相第一希有那可追尋離一切相即名諸佛如是如是親蒙印可有所說耶無所說耶非第一波羅蜜名第一波羅蜜非忍辱波羅蜜名忍辱波羅蜜木雞號月芻狗驚霜何等境界空生空生打頭說個發菩提心我且問你菩提心是有相的是無相的既知離相作佛要須離相發心無住生心生無住心兩個五百合成一貫將謂是別有耶布施離布施相眾生離眾生相說住說降總只一般詞理啼得血流不如緘口真語實語如語不誑語不異語將謂是別有耶空生已知離相未知離法諸供養中法供養最諸布施中法布施最有住法布施有不住法布施且問空生何者為法耶從前直捷了當開口見喉嚨道個如來無所說只此一語千穩萬穩般若波羅蜜經渾身擔荷了也讀誦受持不離這個在在處處華香散滿巖中華雨不足奇矣功不可量功德無邊罪性本空罪業消滅阿耨多羅有所得耶無所得耶不可思議不可思議語言道斷心緣路絕黃面瞿曇一時口掛壁上可笑空生這漢一不做二不休推啞粧聾進前更問發菩提心應云何住云何降伏一路行來不知張老官高姓秤錘上呷汁沙裏尋油豈不好笑諸仁者你道空生為何又起這個問頭教中說青龍應化示現聲聞不厭重重再三申請前問是根本智此問是後得智仔細檢點將來空生已知離相未知離法緊緊的揑定阿耨多羅不曾放捨畢竟謂有心可住有心可降空界碧漂再三撈摝故申前問鵶臭當風如來這番略施活計先將一個軟套索兒套定了他說發阿耨多羅者當生如是心如是之心謂實無耶謂實有耶從前答降答住一云布施一云度生如今撥轉面皮更不如何若何直下覆他無一眾生實滅度者然後揮起金剛寶刀當面欲去說實無有法發阿耨多羅三藐三菩提心鯨吞海水露出珊瑚血淋淋地一副肚腸兩手掀翻和盤托出這裏始是空生放身命處古人說學道如鑽火逢烟漫罷休直待金星現歸家始到頭所謂百尺竿頭須進步也然燈佛所實無有得如是如是親蒙印可如來者即諸法如義此法無實無虗於是中無實無虗一切法皆是佛法非一切法名一切法謂實無耶謂實有耶空生空生於法實無所得親言出親口只為騎牛覓牛不覺證龜成鼈如今一覺醒來端的舌頭只在口裏纔方站得脚根便會轉身吐氣譬如人身長大一箇問端舉起便薦前云佛說非身是名大身此云即非大身是名大身鷹展翅多少快便空生空生也罷也罷今此會中而為菩薩說法上成佛道從無佛道可成下度眾生從無眾生可度護念菩薩付屬菩薩實無有法名為菩薩連一箇把柄都弄沒了非佛土名佛土非莊嚴名莊嚴若佛法有者即菩薩法亦有若佛法無者即菩薩法亦無一切法是佛法一切法無我人眾生壽者通達無我是菩薩法從根倒斷盡底掀飜去年貧尚有立錐之地今年貧錐也無空生空生討甚麼碗憑將五眼覓取三心皆為非心是名為心覓心了不可得誰為菩提心者誰為發菩提心者布施福德拋向那邊更那邊誰問有無誰問多少非色身是名色身非諸相是名諸相前已合提此更分舉身心遠離如幻如化琉璃寶殿明月空堦其有法可說耶其無法可說耶空生空生雖則鼻孔撩天却也別開生面續佛慧命須是其人直為未來眾生通一線地喚作眾生早是錯了也不喚作眾生早是錯了也非眾生名眾生畢竟喚作甚麼末後一著始到牢關樹倒藤枯水落石出如是如是親蒙印可阿耨多羅無有少法可得無我人眾生壽者是平等法非善法是名善法法法何法無法亦法此經尚留元字脚耶平等二字將他個差別話頭一擊粉碎矣受持讀誦遍界難量算數思維所不能及賓中有主主中有賓你不是我我全是你豈有眾生如來度耶有我非有我凡夫非凡夫是回互是不回互以三十二相見如來不見如來諸相非相即見如來不可以身相得見一句頭正尾正雖然離相出生却又捨他不得於法不說斷滅相雙放雙收同生同死是有法耶是無法耶一切法無我得成於忍不受福德福德可思量不如來者諸法如義無所從來亦無所去其可以身相見耶非微塵名微塵非世界名世界非一合相名一合相須彌內芥子芥子內須彌類之不齊混則知處凡夫貪著如來不應貪著曾見個什麼來非我人眾生壽者名我人眾生壽者色相已離情見不立不住此岸不住彼岸不在中間如是知如是見如是信解鐘樓上種菜牀脚下唱贊兩個泥牛鬬入海直至如今沒消息問取什麼人來非法相名法相子過新羅也不取于相如如不動如是如是作如是觀現前大眾不得無分大眾祇樹給孤獨園一時不見了也他化天宮靈鷲山竹林園攪做一塊混作一團你諸人曾見麼摩竭提國普光明堂耆闍崛山一齊移向舍衛國中去也你諸人還信得及麼如此告報也是畵蛇添足死馬做活馬醫未免刻畫無鹽唐突西子當時德山老漢爛熟金剛并青龍疏鈔一時焚却却是何等眼目趙州轉藏不下繩床又是個甚麼道理大眾且過一邊
