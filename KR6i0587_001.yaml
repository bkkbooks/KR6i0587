body:
  text: 曹洞嗣祖沙門淨挺著禾郡秋獄居士曹溶葵石道人朱茂時閲世主妙嚴品十里灘頭蕩小舟蘆花白鳥漫悠悠木童那處曾相識鐵笛一聲歸去休摩竭國小橋村店踏春來拂拂寒梅噴雪開坐久不知身是客溪山煙樹兩徘徊摩尼雲子規啼徹鷓鴣啼玉蝶翻飛樹影迷無那前溪花發處一庭簫管送黃鸝天神讚詠秋山蕭瑟暮煙平墜葉飄空宿鳥驚何事亂雲孤嶂外獨携瓢笠老僧行普賢仙人雲影望瑤臺黃竹聲中動地哀可是穆王留八駿小山煙水近蓬萊華藏海如來現相品海天雲淨泛銀蟾萬里光流江漢兼況是空庭搏白鶴碧山斜影水晶簾普賢三昧品流螢千點小窗前半畝蒼苔影矚天不信光華同日月多年腐草路旁邊世界成就品冰花千嶂玉樓臺海鶴飛翻香水來幾處珠旗迷寶樹却疑瑤島向天開華嚴世界品桃源花發影重重黃鶴山頭煙景濃左右繁華看不盡紺珠宮闕彩雲封毗盧遮那品崆洞問道抑何求帝子乘龍海上遊覿面廣成還不遠碧雲天半影悠悠如來名號品百億文殊度影來山雲海樹轉崔嵬莫教錯認騎牛老定説玻璃在五臺四聖諦品彈罷琵琶擊唾壺胡琴簫管共歌呼繁音幾處留哀怨祗向風前唱鷓鴣光明覺品珠簾一片影披披銀漢飛光玉樹移人在水晶宮闕裏氷壺斜映碧琉璃菩薩問明品南皮才子縱高歌徐阮應劉入網羅偏是子桓誇慧巧彈棊擊劒舞婆娑淨行品青旗千畝趂春晴穜稑親懸黛耜行豈為冷風留帝籍令他編戶習農耕賢首品白水真人自古今龍興大野遏平林東陲建武開王業謹厚從前苦用心升須彌山頂品須彌頂上偈讚品間憑徒侶話從容白鳥飛翻千杖松兀坐渾忘時早暮却疑身在最高峯十住品博望宮前堯母門昭陽少子坐金根軒轅寶鼎親承授揖讓昆明奉至尊梵行品薰風拂拂藕花香一枕砂亭送夕陽間泛小舟三四里亂翻荷葉打鴛鴦初發心功德品巍巍師子獸中尊三百毛羣那足論獨許曼殊留伴侶倒騎青尾踏崑崙明法品闕里衣冠重魯庭幾年運斗著麟經皇皇訪道從京雒紫氣仙公半效靈升夜摩天宮品夜摩宮中偈讚品飄飄仙子列成行簫管聲中舞鳳凰身在秦宮閶闔近鈞天一曲舊來長十行品留得支祈敢憚勞多年委宛胈無毛漫言客死從黃熊石紐靈符封禪高十無盡藏品虗空納盡小葫蘆落落狂歌滿道途非是野人行徑惡從來邋遢老江湖升兜率天宮品兜率宮中偈讚品未央宮殿倚天開太乙光明趂夜來豈謂神仙習歌曲柏梁繚繞歲星才十回向品相將五老共遊河龍馬休誇瑞應多憔悴土階茅茨裏為憐赤子半沈疴十地品麗農山接廣桑西碧海沈沈天路迷迢遞十洲看不見香浮宮闕彩雲低十定品杏花飄落柳如煙盡日狂歌爛醉眠羌笛夢中聲萬里亂隨飛鳥度晴川十通品深山矮屋道人家鶴影松溪石磴斜一自六朝零亂後半龕雲冷老袈裟十忍品將軍躍馬度陰山秋草黃花月半灣血染兜鍪鬚鬢白受降城外幾時還阿僧祇品潮回千轉撥銀沙晶玉迷迷海岸賖無數野鷗飛不盡白華東畔吐朝霞如來壽量品華開華落自年年不學浮屠不學仙留得武陵間甲子逍遙雞犬且隨緣諸菩薩住處品相隨劉坑上天台采藥當年去不回寂寂川原何處問石梁還待老人來佛不思議法品軒丘遙望帝城虗七聖迷迷意有餘剩取玄珠招罔象乘風一夜到華胥如來十身相海品一鉢千山恣遠遊白雲搖落影悠悠自憐瘦骨堆荒草誰識西天老比丘如來隨好光明功德品甘泉宮館擁千官武帝親頒承露盤最是金莖函寶月仙人掌上影團團普賢行品朝來雜戲點輕雲吐火吞刀事不羣原上魚龍還漫衍五陵豪客看紛紛如來出現品池塘雨過露珠零兩岸芙蕖覆緑萍高樹鳥啼聲習習一羣蝴蝶舞蜻蜓離世間品劍術傳來自白狷黃衣舞袖獨軒軒崑崙左轉憑南極太乙星陳天市坦珠簾風細影重重粉黛三千露澤濃齊上招仙拜王母珊瑚零亂玉芙蓉九嶷南服半豺狼斷髮僬僥泣大荒銜取雙丸還不死令他蠻府識君王青樓船簫鼓中後庭花落滿江風箜篌一囀人如夢斜日前山駕彩虹橫擔楖𣗖走天涯斷塜煙迷客路斜霜夜踏翻雲外月隔溪茅屋兩三家冠佩通天出建章琉璃寶扇御爐香登封昨夜留芝蓋侍從親承白玉光依稀四目認方相夜半無頭走獝狂偏是鬼王能肇霸紫衣車轂喜成行白狼白鹿滿山頭穆滿迢迢向北遊歸路唐公醉仙酒更餘神舞昆丘百萬天人帶寶刀親隨鳳輦踏雲霄憑將羽葆傳軍令平蕩妖魔功業高離浮圖天際開金鈴寶鐸設崇階團團落影三千丈阿育同時受記來入法界品昨夜神仙降小樓氷桃碧藕滿空浮隔山鸞鶴飛鳴處説是人間聚窟洲文殊現師子頻申三昧申手摩頂忽然不現道士徐宣海上來漢家城闕漫徘徊濤聲夜夜扶桑國槐柳千門去不回文殊樓閣彌勒樓閣金華飛滿華林園芝蓋雲承日正暄他化天宮渾不遠從教羅窟敢忘言逝多林娑羅林十里旗亭村店長行人問路酒家忙可憐腸斷簫聲裏一簇漁歌送夕陽善財南詢望望前山畑景迷滿頭殘雪竹梢低凍雲穿入寒巖路別有胡僧渡水西德雲相見白鷺池邊秋草多竹林精舍問如何千家佛火醒殘夢是處鐘聲滿棹歌比丘比丘尼聞説天孫巧弄梭掖庭人靜乞金波只今瓜果年年設誰共牛郎影渡河優婆夷優遊走馬向長安滿目新豐人未殘況是六街燈火夜醉斜貂帽倚闌杆長者居士童男童女燕齊怪士逞風流奱大親封五利矦聞道成都信雞卜蜀人揚意最綢繆毗目仙人電擊雷轟光矚天蛟螭動影看飛仙須臾碧落長空靜小月星懸銀漢連勝熱婆羅門最寂靜婆羅門丫角兒童喜聚沙無端塔影遍天涯相看牧豎吹長笛江上歸鴻帶落霞河渚童子善知衆藝童子英雄手內血淋淋劒刀橫施一片心但得雅歌能勝敵綸巾匡坐且彈琴無厭足王妙光城王虗空踏遍小天魔把手相將鷲嶺過獨自剌船江上望沙汀迢遞滿青莎遍行外道婆施羅船師昭君一曲最銷魂馬上琵琶拂淚痕更有鴉黃恨年少乍憑銀管賦長門婆須密女瞿波女尤兵氣動星文漢將旌旗天下聞刀斗盡嚴程不識藍田餘勇李將軍觀自在菩薩正趣菩薩須彌身半踏天宮舞杖還投芥子中最苦修羅遮日月專車休更説防風大天神山前十里大王祠擊鼓吹豳度歲時但使人人愛耕鑿平陽咫尺是伊耆主地神主林神大角芒垂天漢東支機浮逼斗牛宮遙遙桂魄流餘影翹首榮光一夜中主夜神相從天姥足歡娛碧草連空貯玉壺回首小山瓊樹外凌風白鳳舞麻姑摩耶夫人天女長汀道者抱頭眠樓閣橫斜布袋牽彈指了知無別事原來祇索一文錢彌勒一縷金襴迦葉傳山河大地舞翩蹮頭陀行裏親收得不在區區微笑邊普賢普賢行願品露地全身水牯牛緑楊芳草正悠悠多年苗稼憑渠力蹄角臨風儘自由俍亭和尚梵網戒光序每見擔板漢才跨門頭便擬撥無因果信受奉行者又多釘樁鼓杝苦哉幸和尚發大慈悲現廣長舌相親切指示將佛祖心髓揑碎團攏使盡大地衆生直下薦取始知老胡面壁已將一部梵網和盤托出稍涉遲疑戒光去而萬里約菴道人施博謹跋
