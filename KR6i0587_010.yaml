body:
  text: 禹航皓亭居士嚴沆閲金剛般若波羅蜜經陳操尚書問睦州看甚麼經州云金剛般若經操云六朝翻譯師看的是第幾朝州拈起云一切有為法如夢幻泡影睦州善能看經傅大士善能講經且道睦州拈起大士揮尺他兩人還有差別也無見不分明聽我重添注腳敷座而坐敷座而坐等個人來少林九年又差多少若遇個性燥漢一手推翻喝散大衆豈不快便難逢不唧𠺕重新問起如汝所説當為汝説若還一向不説未免法堂草深直恁如何若何誑惑人家不少罷罷罷如汝所説當為汝説應個來機雖則私通車馬從來官不容針空生空生切須解聽如是住如是降伏宴坐巖中也儘殼了當時著甚來由安他兩個注腳若菩薩有我相人相衆生相壽者相即非菩薩離四句絶百非速道速道空生發得這個問頭如來定然口啞菩薩于法應無所住行于布施應無所住只這一句逗漏已多後來説個而生其心重復畫蛇添足若見諸相非相即見如來法眼云若見諸相非相即不見如來且道那一個是頗有衆生得聞如是言説章句生實信不莫認驢鞍橋當阿爺下頷佛告須菩提莫作是説好世尊急與一捺何以故若取非法相即著我人衆生壽者前箭猶輕後箭深當時連下幾個何以故為他空生正坐在死水裏從伊痛處針錐法非法非非法百丈云教語皆三句相連初中後善若只説一句令衆生入地獄若三句一時説渠自入地獄不于教主事雲門三句臨濟三句會得也不難法尚應捨何況非法這裏一擊粉碎如來得阿耨多羅三藐三菩提耶如來有所説法耶討甚麼碗如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説空生空生當時在燈影裏相似一切賢聖皆以無為法而有差別大有這個在於意云何若人滿三千大千世界七寶以用布施至所謂佛法者即非佛法於意云何一個鈎頭用得慣便大凡説法有權有實有正有偏七寶布施衝天子飛來驀地翻身收到四句偈上佛法即非佛法文殊普賢趕出山門外去也且何名此經首山道低聲低聲向這裏會取四句偈僧問晦堂如何是四句偈堂云話墮也不知晦堂晦堂墮也墮也實無有法名阿羅漢親言出親口然燈佛所於法有所得否事從根腳起只為祖禰不了殃及兒孫洗得清來已是大費脣舌於法實無所得須菩提尊者説經次帝釋雨華者云此華從天得耶從地得耶從人得耶帝釋舉手者云如是如是莊嚴佛土即非莊嚴是名莊嚴毗盧遮那佛從寶師子莊嚴世界翻身一輥直輥到七金山際赤鐵輪邊依舊起來與他安樂佛土栴檀佛土妙香佛土妙金佛土蓮華佛土妙喜佛土善住佛土鏡光明佛土打做一塊攪做一團在藕絲孔上出現你還見否無住生心無住布施一齊放倒無住生心一齊提起放得下提得起絶後再蘇剎剎塵塵莊嚴佛事了也盧行者菩提無樹明鏡非臺説清淨心略較些子不應住色生心不應住聲香味觸法生心只在六根門頭却不被他污染曹山隨墮有由也荷澤云西天二十八祖相傳無住的心淨名云從無住本立一切法揑個死蛇頭佛説非身是名大身説身相即非身相是遮句説非身是名大身是表句空生空生也解個有縱有奪受持讀誦和身托付為受一念萬年為持破塵出經為讀常轉如是百千萬卷為誦趙州轉藏遭他婆子檢點且道婆子別有長處也無又受持讀誦此經僧問首山如何受持山云莫污染法眼云證佛地者名持此經還是首山説的是法眼説的是隨説是經鹿門云遍大地是學人一卷經又古德云人人有一卷經隨説是經應無有盡經典所在之處則為有佛若尊重弟子臨濟云心清淨是心光明是無礙淨光是經典所在者法也佛者佛也尊重弟子者僧也是一是三即今認取佛説般若波羅蜜即非般若波羅蜜是名般若波羅蜜僧問智門如何是般若體門云蚌含明月如何是般若用門云兔子懷胎請問諸人是説般若不説般若是名般若不名般若如來有所説法否如來無所説須菩提宴坐帝釋雨華云尊者無説我乃無聞無説無聞是真説般若佛云吾四十九年未曾説一字一耶二耶微塵非微塵世界非世界有者道微塵合為世界故非微塵世界碎為微塵故非世界恁地會又爭得乃申左手索云把將微塵來又申右手索云把將世界來良久云兩彩一賽三十二相即是非相諸相非相不勞重舉驀指芭蕉云東京大相國寺裏破袈裟大慧老人眼中著刺身命布施須知正恁麼時絶氣息時始是學人放身命處尸毗王飼鴿薩埵餧虎不足云也離一切相則名諸佛若見諸相非相即見如來是兩個離一切諸相即名諸佛是一個蓋見者從彼發見名者由我得名且要問你畢竟喚甚麼作佛實相非相即是非相説名實相龜毛拂子兔角拄杖不驚不怖不畏語夏蟲以春氷則驚驅窮子于華屋則怖龍象蹴踏非驢所堪維摩詰云汝今不應有所畏也兼初中後言破空論以畏屬外道者未是應生無所住心不應住色布施無所住心結前無住生心住色布施結前無住布施兩段不同收歸上科無所住心問無住生心無所住心作何分別答無住而生其心無住為本尚涉功勳生無住心覿體無生不落功勳邊事驢覷井井覷驢身裏出門難門裏出身易一切衆生即非衆生非衆生非不衆生即非衆生是名衆生只今説得一半指木羅漢云是衆生是不衆生此法無實無虗無鬚鎖子兩頭搖芭蕉道你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子不可量不可稱無有邊不可思議功德不可稱者天上天下誰與安名不可量如恆河沙無有邊如四大海不思議如請飯香積借座燈王達磨謂梁武云實無功德且道達磨是世尊是我見人見衆生見壽者見相本依他見由遍計教家分帶質境獨影境最為清切咄懷州牛益州馬孟八浪漢莫一味分貼去以今世人輕賤故先世罪業則為消滅雲居云動則應墮惡道靜則為人輕賤崇壽云心外有法應墮惡道守住自己為人輕賤總不若宏智頌云綴綴功過膠膠因果鏡外狂奔演若多杖頭擊著破竈墮竈墮破來相賀却道從前辜負我雪竇又云勘破了也瞿曇勘破雪竇即且置那裏是雪竇勘破瞿曇處問取過去七佛云何應住云何降伏其心末後一著始到牢關腦後一椎欺君不得雪峰三登九上百丈再參且道與空生此問是同是異當生如是心前説如是住如是降未免鉢盂安柄此云生如是心原來師姑只是女人生如是心為甚麼覓心了不可得不見道應無所住而生其心應生無所住心當時初祖安心已為他盧行者下個注腳實無有法發阿耨多羅實無有法得阿耨多羅實無有法名為菩薩黃蘗云還知大唐國內無禪師麼龍牙云打即任打要且無祖師西來意多少人錯會了也如是如是這黃面老軟似綿團當時何不更與一頓如來者即諸法如義目前無法意在目前不是目前法非耳目之所到畢竟那句是主那句是賓此法無實無虗於是中無實無虗龐居士説老婆禪心如境亦如無實亦無虗有亦不管無亦不拘作他座主奴始得巖頭云但明取網宗本無實法你諸人還識綱宗也無明暗參同何不向巖頭句下辨取一切法非一切法名一切法法本法無法無法法亦法今付無法時法法何曾法恁般説詮惶恐殺人還道是不立文字又云劫火然天天不熟山風吹石不聞聲百川注流海不溢五嶽名山不見形老龐也覺辭費非大身是名大身阿修羅許大形體入海八萬四千由旬僅得一半有時藏藕絲孔中請問是大是小五眼華嚴有十眼智眼光明眼出生死眼無礙眼一切智眼且置即如一切衆生心天眼所見佛眼所見還有差別也無不見道諸心非心是名為心華嚴云了心非心故能遍應注破了也法眼依後得智見差別法菩薩有分別中具不分別所謂入實相也夾山未見船子答法身無相法眼無瑕未免為道吾所笑及出世千了百了答個法眼無瑕又是什麼道理你道古人説死法麼過去心不可得現在心不可得未來心不可得過去事已過去了未來不必預思量不於現前有所住了達三世悉空寂未免説老婆禪不如賣餅婆子一言之下焚却他周金剛青龍疏鈔多少直截然雖如此當時德山太魯鈍生若是個伶俐衲僧好將婆子劈面一掌福德無故如來説得福德多達磨對武帝賣寶遇著瞎波斯古人道一鋪功德早已成就了也意作麼生非色身名色身非諸相名諸相前總説身相此別説身相傅大士謂諸相具足應物萬般即法身相也山花開似錦澗水湛如藍請問是堅固色身是清淨法身無法可説是名説法杜口毗耶掩室摩竭從來不喜弄兩片皮然雖如此水鳥樹林未免走漏個消息纍他洞山老子開眼著賊奈何奈何慧命須菩提從來只是須菩提無端上他一個徽號塗污了也當時天女相逢將他舍利弗揑住鼻孔變作五漏之軀却是為何空生空生甕中不怕走却鱉了爾時慧命須菩提至非衆生是名衆生此段非秦譯也唐穆宗時長安僧靈幽感夢入冥至鍾離寺石壁上摹入貫華之義續耶絶耶且道衆生非衆生是何意旨可是了念即定無有起處度盡無量衆生麼説道理儘得卒恐未在良久云三腳驢子弄蹄行畢竟喚做什麼佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是夾山辭船子頻頻回顧子云汝疑別有耶於是覆舟入水永覺詣曹溪一宿投契祖云如是如是祖之與佛寧有兩耶萬古碧潭空界月再三撈漉始應知空生空生也少不得這一問是法平等無有高下三世諸佛不知有黧奴白牯却知有莫不是平高就下麼古人道但高處高平低處低平莫動他分毫許大品經云須菩提白佛言是法平等為是有為為是無為佛言非有為法非無為法何以故離有為法無為法不可得離無為法有為法不可得須菩提是有為性無為性是二法不合不散此之謂也修一切善法善法非善法是名善法修證即不無污染即不得不思善不思惡明上座本來面目你諸人還認取麼凡夫非凡夫是名凡夫龐居士云不是聖人了事凡夫凡夫若會即是聖人聖人若知即是凡夫且道那個説得是又云此語具一理二義理又如何義又如何試別白看轉輪聖王即是如來現意天子得首楞嚴三昧即現神力變普在會皆作轉輪聖王三十二相及諸眷屬七寶圍繞如釋迦佛等無有異這裏合有一問轉輪聖王居金輪位是二地菩薩以福德力具三十二相不足疑矣且道在會諸大衆以何福德盡變轉輪聖王具足如來三十二相真耶幻耶當知如來亦復爾爾若以色見我以音聲求我是人行邪道不能見如來忠國師問僧南方知識以何法示人僧云祗道一朝風火散如蛇蛻皮如龍換骨本爾真性宛然無壞忠云南方知識説法半生半滅僧云和尚此間説何法忠云此間身心一如身外無餘僧云和尚何得將幻泡之身同于法體忠云你為什麼入于邪道僧云什麼處是某甲入于邪道忠云不見道若以色見我以音聲求我是人行邪道不能見如來麼宗鏡録引馬祖示徒云靈光獨照物類不拘巍巍堂堂三界獨步何必身長丈六紫磨金輝頂佩圓光舌相長廣若以色見我是人行邪道萬松秀示衆云不斷聲色是隨處墮聲求色見不見如來還有就路還家的麼乃舉雲門觀音買胡餅話雲門云聞聲悟道見色明心觀世音菩薩將錢來買胡餅却是饅頭這爛葛藤被他一班老古椎盡情説了也畢竟作麼生聻色不是色聲不自聲蚊子上鐵牛無你下口處於法不説斷滅相僧問洞山寒暑到來時如何回避山云何不向無寒暑處去僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎明中暗暗中明回互法門于法不説斷滅相是果然耶無我得成于忍前云通達無我法者説名真是菩薩好音不惜頻頻舉且道如何是無我得成于忍聻石鞏提一張弓見馬祖祖曰一箭射多少鞏曰射一箇鞏問祖一箭射多少祖曰射一群祖又曰何不自射鞏曰若教某甲自射直得無下手處乃依祖得度石鞏固其人哉菩薩所作福德不應貪著凡夫貪著菩薩不應貪著黃金為地琉璃為臺七寶行列是貪著否足指按地寶樹莊嚴才攝神足忽然不見可容你貪著得麼乾闥婆城迷麻了多少人眼孔如來者無所從來亦無所去唐中宗遣內侍薛簡往召六祖簡問祖可坐禪否祖曰若見如來若坐若臥是行邪道維摩詰云若來已更不來去者無所至肇論引放光般若云佛如虗空無去無來應緣而現無有方所大般若云如來真如無來無去善現真如亦無來無去如來真如無真如性亦無不真如性善現真如亦復如是咦飼費了也一合相即非一合相是名一合相石屋云一合相即非一合相明月蘆花沒處尋想伊只在秋江上注指不少瓔珞經云我今有十四億大衆以金剛口説決定義我昔法會有一億八千無詬大士達一性原頓覺無二一切諸法皆一合相從法會出各于十方説此瓔珞大衆一合相者即是不可説且道又説個甚麼來有眼無耳朵六月火邊坐如是知如是見如是信解不生法相法相非法相是名法相沿流不止事如何真照無邊説似他離相離名人不稟吹毛用了急須磨喚甚麼是法喚甚麼是相火爐裏拈取一莖眉毛得麼昔人破句讀楞嚴謂知見立知即無明本知見亡見斯即涅槃且道知見亡却的人莫不無知同于木石麼不見道如是知如是見如是住如是降作如是觀如是如是不取于相如如不動南泉云喚作如如早是變了也洞山過水偈云切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今不是我我今正是渠應須恁麼會方得契如如渠不是我我正是渠且又作麼生會你諸人趂口説如理如事動著了也如夢幻泡影如露亦如電淨名云不住有為不盡無為有為無為是一是二圓通善國師舉陸亘牡丹花話已乃豎起拂子云一切有為法如夢幻泡影圓通圓通為他王老師披枷帶鎖著甚來由又教中道虗妄見顛倒起不得久立從業緣生念念不住即且置有如彌勒在樓閣中彈指向善財言是諸法性如夢如幻如影如像悉不成就又作麼生魏譯云一切有為法如星翳燈幻露泡夢電雲應云一切無為法如夢幻泡影如露亦如電直待當來問取彌勒金剛小引禾中古資聖寺為鹽官安國師道場俍亭和尚重來繼席國師嘗云虗空為鼓須彌為椎甚麼人打得俍亭和尚則豈非其人哉海內嚮慕翹勤非一日矣夏五之月大周直叩座前飽聆禪悅真炎暑中一帙清涼散也別後挂帆而北好一柄犀牛扇子直扇清風過于虎阜快甚快甚至讀所為金剛妙義則橫説竪説權説實説七縱八橫翻天倒地無所不説究未嘗説空生云未曾得聞如是之經大周亦云未曾得聞如是之説也因合掌恭敬而為之引雲棲弟子大周拜題
