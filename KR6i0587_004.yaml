body:
  text: 雲門鏡湖船客瀞艇著秀州柴灣老人吳鑄赤肩頭陀沈廷勵閱掩室摩竭杜口毗耶兩個老漢一般鼻孔大家扶起破砂盆菴羅樹園偏欲借他著力弄上一班猾頭曼殊室利阿逸多五十二個少叢林擦掌摩拳弩力向前一上尋常著衣喫飯千二百五十人一時捱落了也看的眼快做的手快玄沙到莆田魚龍觝角許多雜戲問他小塘長老總不見得這是西京餘習吞刀吐火多少希奇須彌鐙王香積菩薩以至不動如來一總是個撒荳成兵木人相打幻妄不實之法不信先做一齣五百長者子獻一寶蓋如何是寶蓋破砂盆荷葉團團團似鏡菱角尖尖尖似錐三千大千世界百千諸佛一齊走入這寶蓋中豈不作怪針鋒棗葉陶家輪大海內牛跡須彌如芥子若干伎倆做盡了也且道有多少長處聻老僧只解看東林西林創立蓮社說個淨土法煞有來歷如帶角虎不妨兩彩一賽知麼知麼心淨則佛土淨長寂光土實報莊嚴土凡聖同居土方便有餘土被他螺髻梵王略施手脚一撥撥翻這些黃金七寶與他丘陵坑坎荊棘瓦礫攪作一塊打做一團再也不容廝認罷罷罷不如隨分納些些多少是好此土眾生剛強難化釋迦老子隱其無量自在之力口喃喃地說淨說垢說有漏說無漏說邪道說正道說有為說無為說世間說涅槃東方西方切莫打做兩橛不見道眾生病菩薩病吾有大病非世所醫維摩居士病臥一床說無常空苦之法錯錯四大性自復如子得其母舍却無常空苦之身覔甚佛身渠正是我我不是渠頭長三寸頸長二分起坐鎮相隨語嘿還不是金粟如來變卦了也日面佛月面佛這師姑藥也不會煎得只此一機慣得其便五百弟子眼睜睜的奈何他不得迦旃延論義無比阿㝹樓陀天眼無比優波離持律無比羅睺羅密行功德無比阿難多聞無比被他問得口啞和那鶖子智慧采菽神通小巫見大巫一時氣索金色頭陀百萬神天獨誇得意却也不犯當頭善現持鉢只合撩起便行絮絮聒聒說許多般留下個隨墮法門後人因之說不斷聲色是隨墮披毛戴角是類墮不受食是尊貴墮呀呀呀墮也墮也清淨本然云何忽生山河大地滿慈滿慈彼自無瘡勿傷之也直捷承當猶較些子明州憨布袋十字街頭等個人來不免入廛垂手且道為甚如此聻無生即是正位若見無為入正位者高原陸地不生蓮華聲聞入正位菩薩雖知諸法不生而不入正位正中偏偏中正疊三變五回互分明彈指門開也不過是現前樓閣光嚴持世各說異端大好一場曲調石頭絫石為戶雲居縛屋而居舉足下步無非道場酒肆婬妨皆為佛事波旬面目帝釋衣冠十方世界作魔王者多是不可思議菩薩眾魔外道皆吾侍者魔女應以與我惟我應受臺山路上鄂渚灘頭斷送浮杯掀翻德嶠諸魔眷屬一燈然千百燈南泉設粥甘贊散䞋財法二施等無差別當時善德鈍置煞人須些瓔珞變成四柱寶臺揑目空華誑惑他家男女獨有個七佛之師是司空見慣的三處度夏弄出百醜千拙白椎下座却解遮羞約莫有幾分相應維摩若是個漢何不一時閉却大門且教題鳳而去一場懡㦬三十二人不妨疑著奈何忍俊不禁下榻相見不來相而來不見相而見敗闕了也尋常道個諸法不相知諸法不相到鐘中既無鼓響鼓中亦無鐘鳴為甚麼西牛貸洲普請南贍部洲喫飯維摩維摩空病亦空且問誰為維摩誰是病者無慧方便縛有慧方便解無方便慧縛有方便慧解又說個無縛無解豈不自相矛盾不厭生死不取涅槃雖行六道而不盡漏喚居士作一頭牛得麼大士對譚取笑不少阿修羅掌擎日月長八萬四千由旬立大海底僅及其半然則四萬二千之身三萬二千之座內藕絲孔中甚非奇事向彼須彌借他獅座入丈室中不迫不隘你面皮多少厚來無邊剎海不隔毫端十世古今不離當念這是他菩提樹下三七日中家常茶飯七日為一劫一劫為七日十方眾生十方諸佛十方國土日月星宿於一毛孔普令見之正如嚼飯喂嬰孩食者還唾且要問你普賢毛孔遍滿十方還出得他人窠臼麼長者身居士身帝釋身梵王身世主身轉輪聖王身佛身辟支佛身聲聞身是多身是一身汝是文殊更無文殊是文殊者維摩原是個老胡子三十二應十四無畏攙行奪市轉見不堪幻師觀幻人幻人施幻法有權有實有照有用四賓主四料揀三玄三要一喝如金剛王寶劒一喝如踞地師子一喝如探竿影草一喝不作一喝用龍象蹴踏非驢所堪師子咬人韓盧逐塊淨名淨名通身狼藉矣慈悲喜捨法爾如然不善不生善法不滅白居易問鳥窠諸惡莫作眾善奉行是否是否不依有住而住不依無住而住從無住本立一切法剎竿頭上煎䭔子三個胡孫夜簸錢這裏穿鑿不得須菩提宴坐帝釋雨華維摩詰說法天女散華畢竟宴坐的是說法的是風動旛動仁者心動有分別動無分別動王太尉入昭慶明昭潑翻茶銚譬如人畏時非人得其便賓家有過主家有過婆須密女勝熱婆羅門無厭足王是解脫不是解脫舍利弗為天女天女為舍利弗倩女離魂孰是真者化身受用任運遊行佛化所生非沒生也耆闍崛山舍利弗等飛光灌頂法化所生毗耶城裏天女遊戲佛化所生這都是化生的樣子莫行心處路不挂本來衣舍利弗還為凡夫我乃當得阿耨多羅三藐三菩提纔見人來便問是凡是聖具足凡夫法凡夫不知具足聖人法聖人不會此語具一理二義若人辨得兩處負門陋巷不騎金色馬迴途別著破襴衫王老師向異類中行行於非道通達佛道蜆子和尚寒山拾得芭蕉泉大道酒仙鴉葬婆不可端倪如是如是六十二見皆為佛種塵勞之儔為如來種八萬四千諸煩惱門皆佛事也我有一機瞬日視伊若還不會別喚沙彌棒如雨點喝似雷奔且莫當面錯過不見道兩刃交鋒莫迴避麼火中生蓮華是可謂希有衝天志氣不落尋常村中用村中財物縣中用縣中財物不著村中不著縣中用兩處財物或為邑中主或作商人導為諸貧窮者現作無盡藏藏舟於壑藏山於澤有盡耶無盡耶真師子兒善師子吼汝今不應有所畏也眼色耳聲鼻香舌味是一乘法色即是空非色滅空明與無明同為一體明暗各相對明暗原不二功德天黑暗女有智主人二俱不受有漏笊籬無漏木杓朱頂王菩薩說這赤頭公作麼三十二菩薩人人鼻孔撩天個個脚跟著地文殊師利看得眼華也只好別行一路鐵錚錚一個維摩詰這番口挂壁上布袋裏老鴉忍氣吞聲嘿然而坐文殊路見不平臂膞不向外曲從旁喝采賓則始終賓主則始終主說時嘿嘿時說無語中有語有語中無語逢強即弱遇貴即賤一絡索還體會得麼法輪未轉食輪先轉菩薩子喫飯來廬陵米作麼生價喫粥了洗鉢盂去身諸毛孔皆出異香全虧他化主之力香積國中常以香飯而為佛事還有不受食者麼打破鍋子須是其人放下鑊頭阿誰無分得力須忘飽休粮更不饑勿以有限意食之使不消也就中功立中功無功之功功用之功不盡有為不住無為無為入正位者高原陸地不生蓮華闍黎此事不得孤滯如枯木上糝些子花方與他合枯木花開劫外春須是轉功就位始得維摩維摩伎倆盡矣不起於座接妙喜世界如陶家輪三道寶階從天而下泥牛吼月木馬嘶風不覺不知此之出入毗耶丈室函蓋十方阿彌陀佛阿閦佛從東過西從西過東左繞一匝右繞一匝如今平分海宇克定山河但高處高平低處低平切莫指空望空隨人起倒娑婆世界度生無量為欲化諸樂小法者不盡現其清淨土耳往昔劫中物為月蓋王子王有千子即是賢劫千佛分內紹外紹別臣種王種譬如王子能成一國之事月蓋比丘得之矣鷄足山前待彼彌勒一生受記為護法城阿難老昏誤水潦鶴不思億經受持勿失也還有一問諸大乘經各說陀羅尼為密部維摩詰所說經何獨無之癡人癡人維摩嘿然說陀羅尼已竟圓覺連珠序自波翻船子夢斷鴦湖松戴鳥窠依然寶石遙遙千載俍亭和尚獨振宗風今日之澧陽藥嶠也余舊本通門重來問道讀圓覺連珠一帙以雲間雒下之驚才寫白鷺竹林之遺意昔陳思子建傳梵響於魚山鳳閣彥和走雕龍於竺國樂旨潘詞瞠乎後矣若乃春風芻狗嘷徹桃源夜月木鷄啼殘玉漏長蘆進而比肩中峯望之卷舌尤非風穴鏡清所能及也是為序禹航弟子嚴曾榘智鼎敬題
