body:
  text: 古資聖寺比丘淨挺著愚庵同學楊雍建淨嵩徐旭齡淨嶽閱菩薩心地品之上下如何是大修行人披毛帶角如何是大修行人殺人放火諸人還會得麼若也會得則舉足下足無非道場逆行順行全身受用波羅提木叉一時說竟了也戒光從口出非青黃赤白色三世諸佛異口同音一時說戒諸人還得聞麼末法比丘輕藐戒律半月半月布薩視為具文有等狂慧之徒忽略威儀不拘行檢動引泉大道憨布袋長安酒仙蜆子和尚一班逆行人做個護身符子說只貴見解不貴行履禮豈為我輩設耶苦哉苦哉閻羅大王准備著刀山劒樹銅柱鐵床待君久矣眼光落地時這嘴頭子是一些用不著的戒如明日月亦如瓔珞珠七佛以來奉為儀軌鳩留秦佛時說戒經名甘露鼓拘那含牟尼佛時說戒經名法鏡迦葉佛時說戒經名分別空今釋迦佛說戒經名梵網大梵天王設大網羅幢光光相入世界如網孔法門亦如網孔諸人可曾見麼梵網經六十一品此心地品當第十品也奇怪也奇怪黃面老子是報身佛本源盧舍那是法身佛千百億釋迦是化身佛你也放光我也放光攪做一塊混作一團不知誰主誰賓誰明誰暗光光相入如帝網幢大是一場好看且要問你這可是戒光麼這可不是戒光麼若道即此是他釋迦老子分明道非青黃赤白色若道離此是只這紫金剛光明宮中又是何物是不得非不得取不得捨不得試道將一句看是了是了法身有兩般病二種光古人明明道了也瞌睡漢似這般逐塊有甚了期釋迦老子慣會粧喬甘心向奴兒婢子裏藏身推出他一尊本源盧舍那佛指東話西拿三道五這盧舍那佛姓張姓李且莫管他畢竟淨飯王太子與他結伴同來如形廝影這千百億個小可釋迦也是他倚草附木的英靈一類孤魂搖身所變渠不是我我正是渠家鬼弄家人說的說聽的聽做得好看當時摩醯首羅天王若解弄些手脚只閉却大門不許放他入來看他黃面瞿曇有何臉嘴還說什麼千丈法身千百億化身麼尋常道法身無相這赫赫蓮花臺座上嘮嘮叨叨說佛法的又道是本源法身纔到得法身邊未有透法身句還知咸通年後說個法身向上麼昨夜雨澎亨打倒葡萄棚知事普請大眾拄的拄撐的撐撐撐拄拄到天明依舊可憐生與他懷州牛益州馬差別在甚麼處葛藤且止十發趣心十長養心十金剛心十地是名心地如何是發趣心長養心金剛心臺山路上焚却疏鈔過去現在未來覔心了不可得肉團心緣慮心真如心涅槃心一齊拋向他方世界那邊又那邊說甚麼三十心中本源作佛如何十地五方五土是名十地說什麼初地二地三四五地乃至八九十地如何捨心池塘黃鳥戲蜻蜓如何戒心土地公公不喫葷如何忍心風翻殿角狗搖鈴如何進心與我想出一錠金如何定心三寸眉毛壓眼睛如何慧心君向瀟湘我向秦如何護心一卷靈符肘後經如何喜心家家明月滿天星如何頂心崑崙腦後鐵三觔如何慈心猫兒捕鼠假惺惺如何悲心南山白額老成精如何喜心光頭稚子響風箏如何捨心百歲老翁分夜燈如何施心半兩黃連加細辛如何好語心相迎笑臉強生嗔如何益心博叉王子說分明如何同心鴛鴦綉出巧叮嚀如何定心釘樁搖櫓大江濵如何慧心濠濮千年風景新如何信心丹鷄白犬結良朋如何念心失却當爐犢鼻褌如何迴向心金剛不肯折分文如何達心犀因玩月角生紋如何直心盆打瓶時瓶打盆如何不退心將軍鐵馬走兼程如何大乘心轆轤盤索重千鈞如何無相心一鈎三點太紛紜如何慧心旄頭見影病人民如何不壞心亡僧舉火費柴薪如何平等地闍黎只見錐頭利如何善慧地船上漁翁不姓謝如何光明地歌管樓臺聲細細如何爾焰地錯認祖師西來意如何善照地三個胡孫猜啞謎如何華光地日裏金烏輝午夜如何滿足地長安大道長遊戲如何佛吼地拍手燈籠說實諦如何華嚴地撞頭磕額難迴避如何佛界地饑來喫飯困來睡好笑好笑一卷梵網經佶曲嶅牙不能句讀諸方學者要將些語言文字去凑泊他早是錯了我如今以經解經不免再把本經言句申說一回布施大眾如何是捨內一切捨外一切捨有為捨無為捨陰入界處一合相無所不捨是名為捨如何是戒非戒非非戒無受者無集者一切性離是名為戒如何是忍空忍一切處忍無生忍苦忍無量行忍乃至我人縛解一切法如忍相不可得是名為忍如何是進登無生山如有如無無入無不入是名為進如何是定不寂而滅念念寂滅是名為定如何是慧非果非因非凡非聖非罪非福非縛非解非八倒無生滅無緣而知是名為慧如何是願願心連願心連相續不絕是願體性終不可得是名為願如何是護連人無生皆明光明光護乃至幻化所起如無如無是名為護如何是喜不入有為不無寂然是名為喜如何是頂如頂觀連觀連如頂不見緣不見非緣是名為頂如何是慈無生住滅如幻如化是名為慈如何是悲親怨自他平等一樂是名為悲如何是喜離一切有是名為喜如何是捨平等一照是名為捨如何是施無合無散是名為施如何好語行順佛意是名好語如何是益入利益三昧震動世界乃至現形六道無量苦惱不以為患是名為益如何是同以無我智分身散形是名為同如何是定無起無作是名為定如何是慧光𦦨明達無有受者是名為慧如何是信心空故信我人名用了不可得是名為信如何是念轉變轉化同住同時是名為念如何深心深深入空深深解脫是為深心如何是達於諸法空一切通達是名為達如何是直無結無縛是名為直如何不退不住退不行退不念退一淨一照是為不退如何大乘智乘行乘任載任用是為大乘如何無相不離妄想說解脫照不斷結業說三世法是為無相如何是慧無集無受入一切法是名為慧如何不壞入魔不壞入佛自在是名不壞如何平等一佛土入無量佛土一劫入無量劫不可說法為可說法反照逆順皆一切法常入二諦而在第一義中知十二因緣十惡種性而常住善道入十禪支行三十七道而現非道是為平等如何善慧依苦集滅道諦捨一切貪著行一切平等觀諸法空際地水火風皆吾故身觀所化一切眾生與平等樂是為善慧如何光明因緣十二如是行相我久已離入光明神通總持辯才遊行佛土一音中說無量法品是為光明如何爾𦦨爾真𦦨俗不斷不常無一無二住十種覺深入定果善權方便教化眾生是為爾𦦨如何慧照具足十力知自修因果亦知一切眾生因果淨國土為惡國土惡國土為妙樂土轉善作惡轉惡作善色為非色非色為色以男為女以女為男六道為非六道非六道為六道是為慧照如何華光開敷妙華發種種光十智具足現無量身心口別用不可窮盡是為華光如何滿足一切法中常住三昧六品具足住是十八聖人心心三昧下地所不共法一切眾生是我父母一切佛所行法乃至八地九地一切法門我皆已入為滿足足如何佛吼入法王位三昧具十品大明空門不可說不可說神通道智百千陀羅尼門百千三昧門百千金剛門百千神通門百千解脫門一念一時無不具足乃至返照順照逆照前照後照因照果照空照有照第一中道義諦照是為佛吼如何華嚴如來三昧出入無時三千界中示現佛事轉魔界入佛界佛界入魔界轉一切見入佛見佛見入一切見佛性入眾生性眾生性入佛性明𦦨明𦦨一道清淨一切眾生是我父母外道天魔視如父母住是地中從生死際至金剛際一念心中轉無量界是為華嚴如何佛界空復空空復空入虗空性見平等智如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊佛地是十號中一切聖人之所入處是為佛界如是心如是地如是章句如是語言說已說了註已註了盧舍那佛千年老古錐自己說自己聽哄弄頑愚故為奧義關門打鼓鼓聲在外須知有事大家知一總不曾瞞你見麼見麼菩提樹下敷座宛然侵假在妙光堂說法侵假在帝釋宮說法侵假在𦦨天中說法侵假在四天中說法侵假在化樂天說法侵假在他化天說法侵假在一禪二禪三禪四禪摩醘首羅天王宮中說法一耶多耶同耶異耶分耶合耶散耶聚耶莫眼花好守宮蜥蜴雖有異名尺蠖泥龍原無兩物藏身處沒踪跡沒踪跡處莫藏身如來世尊花手花脚弄個法兒將他盧舍那佛千百億釋迦忽然不現單單留個丈六老比丘身為他凡夫癡闇之人說初發心常所誦戒知麼知麼一切眾生皆有佛性常住法身無別無異汝是當成佛我是已成佛眾生受佛戒即入諸佛位切莫自生退屈自甘墮廢若受佛戒者國王王子百官宰相比丘比丘尼十八梵王六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但能解語盡受得戒知麼知麼不順非孝不奉非輔孝順至道之法孝名為戒戒光從口出非色非心非有非無非因果法乃至不生不滅不斷不常不去不來不一不異於學於無學勿生分別想是名第一道亦名摩訶衍諸人曾夢見麼佛說菩薩戒品是三聚淨戒一尸羅聚二智慧聚三福德聚法報化身一時具足原不當小可的十波羅夷罪四十八輕垢罪心問口口問心一一從頭細加體驗勿徒謂紙上陳言逐隊隨行布薩布薩已也念念無處所作耶無作耶如人飲水冷暖自知這裏莫瞞人好佛初成道為五居士說優婆塞戒為丞相母夫人說八關齋戒為羅睺羅說沙彌戒因時因事因地因人為比丘說二百五十戒為比丘尼說五百戒而菩薩戒以為其首佛心廣大佛意周詳謂七佛以來傳持此戒吾悉達太子非本源佛不過是誦戒之人為汝等宣揚是事耳法華會上古佛放光極樂國中彌陀現影此赫赫蓮花臺畔盧舍那說法主伴交參重重無盡君耶臣耶理耶事耶還鄉盡屬兒孫事祖父從來不出門要識紫金剛戒體麼問取本源佛去
