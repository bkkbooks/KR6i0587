front:
  text: 俍亭和尚閱經十二種序俍亭大師所著閱經十二種為有語耶為無語耶以為無語懸河之口亦既共聞以為有語法本無法詎庸詞費然則達摩西來不立文字維摩詰說法天女散華無語中有語有語中無語也俍師憫末學榛蕪高者獵虗空卑者循記誦孰與鏡原委晰疑義鰓然慮之故閱經諸篇不惜剖露為世津筏其言曰雲溪抑不得已不免塗汙古人推此志也豈好辨歟三藏教典西域聖人不得已而有言者也閱經十二種雲溪大師不得已而言言者也昔我孔子憂微言之將絕退而與七十子之徒修明先王之道刪詩書定禮樂以垂示來世然後六經之義炳若日月沛于江河俍師固吾孔子之徒也其閱經也為無隱為不倦猶然孔子之志也若迺杜口毗耶掩室摩竭機用所契同源共貫聽俍師談經而愚者解頤辯者卷舌青龍疏鈔便可焚却說時默耶默時說耶十二種中雖旁通曲喻猶之乎不立文字云爾息齋先生之語曰俍亭橫說豎說深說淺說無所不說究竟實無一說非深知俍師惡能道此哉康熈九年庚戌中秋法弟楊雍建題于武林敬勝堂俍亭和尚閱經十二種序藥山看經貴圖遮眼青華嚴念法華皆後來傑出者豈獨太原上座善解三因淨因小師兼通五教哉俍亭和尚本江左之名賢傳洞山之正派五家宗旨莫不探微窮源論說同異又復疏觀藏典拈弄成文如來禪祖師禪都成一貫今人智識短淺未辨全經動云故紙堆頭漫勞採擇不知世尊陞座迦葉破顏鷄足山前拍拍是令剎竿倒却換取眼睛貝葉傳來掀翻鼻孔自非宗說兩通安能敲唱雙舉此編一十二種變變化化出奇無窮或藉教以明宗或援儒以入佛遂令黃面瞿曇按下雲頭向曹溪路邊攙行奪市一班咬文嚼字的曹劉顏謝潘陸徐庚只得飲氣吞聲匐伏靈山齊身拜倒且謂之有文字耶無文字耶宗耶教耶儒耶佛耶誠開闢以來未有之書固震旦國中不刊之典也三千里外逢人不得錯舉傳曹洞正宗三十五世豫章黎元寬博庵道人拜題雲溪俍亭和尚閱經十二種序白馬新翻金輪乍轉魚山梵響傳逸格于黃初支遁清譚扇微風于江左過廬林而問道惝怳難憑入瓦官以窮經逡巡莫返豈必宋雲嶺上乃見西來梁武殿前方明祖意哉或者謂五千卷軸盡成雲霧之堆三百宮庭悉屬形骸之府然則馬鳴龍樹不當祖述于少室門隅無著天親宜早棄離于史陀天半矣塞河源而疏洛汭埋天柱而封嶓岷未為論之得也俍亭和尚鷲嶺重來竹林應迹指揮任意驅碧鷄黃馬于雙樹之餘舒卷忘情題綠字赤文于畢鉢之外火珠騰耀則海藏煥其龍文純錦流霞則鮫宮郁其鴻烈論義及于微芒談經偶止十二問胡僧于鐵鉢降等相招走學士于籃輿望風趨拜池邊神女承几硯而露濕珠囊天上靈祗奉給侍而風驚虎觀昔鼎州道貴傳信字于金剛投子望高拾言音于摩竭相逢杜順煙水言旋覿面瑯琊山河作舞固知剎竿臺畔留雞足之袈裟祇樹林中掛大庾之衣鉢支離者既溺筌罤宕往者復遺繩簡悅笙簧于耳目問律呂則不辯伶倫塗丹臒于堦墀按黼黻則未知黑白豈將以隻履為芻車黃梅為蒿矢耶若乃儒童分衛升闕里而拜衣冠仙子凌空出凾關而存點畫一篇之內數語該通一軸之中群言奔赴風雲奏閶闔之間日月出崑崙之下列子乘而御天州來笑其觀正吾無以測是書矣吾無以測是書矣山陰同門法弟祁駿佳法名淨超頓首拜撰閱經十二種目次華嚴頌梵網戒光楞伽心印維摩饒舌圓覺連珠楞嚴答問藥師燈𦦨彌陀舌相金剛三昧心經句義法華懸譚涅槃末後句
