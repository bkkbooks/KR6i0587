body:
  text: 水西俍亭淨挺著擕李張天柱天植同閲壽量品雙樹林中如來入滅他方世界無邊身菩薩及此國土天龍魔屬大地山河鳥獸草木悉皆震動可可的迦葉阿難一對闡提不孝之子不到面前是何道理瞿曇瞿曇憐兒不覺醜人天衆中大開口說我今正法眼藏盡付摩訶迦葉為汝衆生作所依止意在于何諸仁者莫眼花好如來紫磨金色之身不般涅槃諸人見涅槃摩訶迦葉不見涅槃衆生無常如來是常六祖大師早是道了也是醍醐是毒藥如蟲禦木偶爾成文勿以革囊盛彼上味知麼知麼伊字三點縱亦不成橫亦不成竝亦不成雲門三句臨濟三玄盡被他鄂渚船夫一篙打盡還出得老僧圈繢麼純陀獻供滴水難消入海求珠徒勞罔象且要問你迦葉菩薩迦葉摩訶是一箇是兩箇聻大地山河作舞金色作舞衆中辨取還我箇迦葉來金剛身品垂手還同萬仞崖正偏何必待安排琉璃古殿照明月忍俊韓盧空上階渠不是我我正是渠于此會得黃金瓦礫攪做一塊打作一團直是分疏不下說甚麼金毛師子花藥欄山花開似綿㵎水湛如藍這一絡索也不消得了瞿曇背痛分明入滅口巴巴說箇金剛不壞之身還信得及麼老僧不持五戒常以弓箭刀劒之屬侵擾衆生儘著人罵我道禿居士却也甘得畢竟冢間樹下淫女寡婦之家是有分別是沒分別雖則曹山顛酒不掛靈衣要且雲光變牛此事不當小可見麼見麼師子吼時芳草緑象王回處落花紅急著眼看名字功德品諸方五味禪我這裏一味也無說甚八味具足二十年住山不少鹽醬錯斷送了多少人也滯羸尫藤林荒禪子訝中眉垂是何章句是何名字達摩老臊胡趂口道實無功德還諦當麼如來性品如來有密語迦葉不覆藏一夜落花雨滿城流水香依法不依人依義不依語依智不依識依了義經不依不了義經玉線金針鴛鴦繡出有恁般人麼饒你一肚皮佛法稗販老僧總只食酥不消轉益增病乃至波旬出世詐現威儀飲酒食肉樗蒲圍碁大踏步向前自稱解脫苦哉苦哉我佛法中名為罪人未得謂得未證謂證動口是德山捧臨濟喝搖唇吐舌慣占便宜古者道醍醐上味為世所珍遇斯等人翻成毒藥他大覺世尊臨當滅度一一說破了也譬說寶刀如羖羊角我王庫內無如是刀是佛是魔切須辨取空如來藏秪在目前彼力士珠不離額內你是恁麼人家男女我是大闡提人家男女涅槃堂裏儘賣風流闡提有佛性闡提無佛性這也不勞再辨了蠢動含靈皆有佛性為甚麼狗子無佛性老趙州老趙州業識茫茫欺人太煞犀因玩月紋生角象被雷驚華入牙可是知而故犯麼伊優啞遏囉多是何音響鐃歌十八曲上之回君馬黃總不如妃呼希一句囫圇道了也雲門一字是滿字是半字仰山識字是梵字是唐字獼猴捉月秪益自勞佛真法身如月在水一撾塗毒聞皆喪身在其中那得知八十公公入場屋真誠不是小兒嬉大慧此頌捉敗巖頭座上仙陀只今未遠洞山問曹山不變易處豈有去耶曹云去亦不變異借借不借借若辨來由本有今無本無今有三世有法無有是處皆為戲論妙妙妙廣額屠兒千佛一數立地成佛還說什麼有佛性無佛性麼一切大衆所問品洞山和尚臨當入滅辦愚癡齊供養大衆如來化身無量受純陀供及天人供有兩般麼一音演法隨類得解舌頭不在口裏與汝赴箇來機有時恁麼有時不恁麼守株待兔求劒刻舟似這般死漢有甚用處喪欲速貧死欲速朽夫子有為言之也你道如來有二種語麼汝真文殊更無文殊是文殊者為什麼迦葉白椎乃見百千萬億無數文殊倩女離魂誰當是真誰當是幻曼殊童子好逞風流正好取來和他純陀一坑埋却惟有迦葉阿難不在裏許剎竿倒却別露鋒𨦵豈肯拾他殘唾罷罷今日牙痛今日頭痛不能為汝說了也吾有大病非世所醫不病者來看和尚麼老僧看他有分現病品日面佛月面佛膿滴滴地此中有祕密否瞿曇熟處難忘一生粧模做樣鼓兩片皮哄弄人家男女臨命終時一齊迸現少不得見神見鬼撒沙撒泥魂魄飛揚眼花撩亂提婆達多豈有出地獄分如來豈有入地獄分大抵還他肌骨好不搽紅粉也風流饒伊掩耳偷鈴到底出乖露醜恁般行徑早被旁人勘破也盲者見色聾者聽聲啞者能言拘躄能行諦當甚諦當奇特甚奇特秪如玄沙三種病人且作麼生相見自古道密在汝邊麒麟一角豈足為奇折足泥牛飛過東洋大海聖行品聖人不知即同凡夫凡夫若知即是聖人才有一毫聖凡情見早是隔津了也瞿曇瞿曇是凡是聖聻師子尊者已得蘊空白乳湧高數丈難忍能忍難行能行如帶浮囊度彼大海意在于何古者道明知生是不生之性為甚麼却被有生之所流轉功德天黑暗女有智主人二俱不受阿誰繫縛汝來上大人丘乙己知什麼苦斷什麼集證什麼滅修什麼道一總寐語說他怎的如何是道十字街頭休斫額如何是道大好山如何是道墻外的如何是道明眼人落井畢竟這幾則語中那一語最親切處處緑楊堪繫馬家家有路透長安從門入者不是家珍我為法王於法自在世諦與第一義諦切忌打做兩橛若向世法外更討甚出世法稱錘上呷汁早只自生障礙曹山取正命食全彰尊貴家風不斷聲色帶角披毛本地光明自由自在色不到眼聲豈到耳且喚什麼作聲喚什麼作色聻老僧百年後山頭檀越家作一頭水牯牛輕打我輕打我他解向異類中行機關木人如是如是鐘中無鼓響鼓中無鐘鳴皮也無打甚麼鼓鼓也無打甚麼皮若謂老僧曾轉法輪即是謗我小乘錢貫大乘井索二十五絃彈夜月腰纏十萬下揚州說甚照鏡三昧寶鏡三昧一總是錯呀呀呀閻羅王來拿我也生身入地獄合是老僧招得好手猶如火裏蓮宛然自有冲天志心持半偈月到上方癡人莫更說夢梵行品喚和尚作一頭牛得麼得得如來世尊作鹿作羆作麞作兔作龍作金翅鳥作粟散王作轉輪聖王是有差別否青牛白狗玉鳳金鸞這裏分疏不下獼猴獻蜜百鳥銜花家有白澤之圖必無如是妖怪達摩西來不立文字時節若至其理自彰大慈大悲開我迷雲令我得入如甘露味如如意珠寧說阿羅漢有三毒不說如來有二種語然雖如此老僧顛倒後語不應前言當門齒缺莫怪莫怪瞿曇無賴純將諸惡羅剎以為侍從所可教詔純說虗空只學得箇障眼法兒五百力士揭石足指飛騰掌中師子一齣攝彼狂象以至雜華飛砌寶樹凌階墻壁動搖井泉流溢弄些觜臉哄動頑愚莫錯莫錯切切不要信他我佛法中無如是事譬如以手搏弄虗空虗空打虗空罵虗空往來虗空應接提婆達多真汝之師開示悟入佛之知見理無礙事無礙理事無礙事事無礙法無礙義無礙辭無礙樂說無礙知麼知麼葉且不是根角且不是牛鶴且不是水見卵思炙莫太莫計直得清淨本然戒光口出藕絲牽大象芥子內須彌到恁麼時火不能燒水不能爛風不能動地不能持生不能生死不能死住不能住壞不能壞貪不能貪嗔不能嗔癡不能癡畢竟以何為驗聻阿闍世主以少金剛能壞須彌亦如少火能燒一切如來為彼住世一劫把手同行大王來也大王萬福無作無受罪性本空文殊持刃來逼世尊吾必被害為善被害知麼知麼阿難迦葉是一闡提毗婆尸佛早留心直至如今不得妙呀呀呀眉毛墮也嬰兒行品如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故暗中明明中暗偏中正正中偏丈二長和尚摸頭不著諸仁者一大藏教是止啼黃葉千七百則是止啼黃葉乃至典墳丘索醫卜種樹之書是止啼黃葉三百篇是止啼黃葉五千言是止啼黃葉蘭臺石室金簡玉書是止啼黃葉街談巷議是止啼黃葉咳嗽涕唾是止啼黃葉為汝方隅曲設權巧泥牛吼月木馬嘶風行于非道通達佛道譬如人家有三子一著村中一著州中一著縣中且道那一箇是內紹那一箇是外紹聻昭王少子壓紐武帝立少子趙母恤少子登常山丈夫多愛少子彼少子者嬰兒也是麼煦日發生鋪地錦嬰兒垂髮白如絲奪人奪境即且置有者道丫角女子白頭兒是何章句光明遍照高貴德王菩薩品知麼知麼于兜率天實無如來迦毗羅城實無如來迦毗羅園實無如來陀迦阿羅邏中實無如來阿利跋提河中實無如來菩提樹下實無如來波羅奈城實無如來拘尸那城實無如來如來不出閻浮提界非見而見不聞而聞清涼文益禪師嘗說四法有聞聞有聞不聞有不聞聞有不聞不聞曹山亦有四法有借有借借有不借借有全超不借借也奇怪也奇怪剎竿頭上一道寶光直貫到他方世界依舊轉來飛向石師子口裏且道是何祥瑞聻爾時世尊默然文殊默然迦葉默然一齊口掛壁上意在于何生不可說不生不可說生生不可說生不生不可說不生生不可說不生不生不可說不可說不可說僧問愚庵如何是實相庵云石匠夏小川僧云某甲問實相庵云阿喋大衆看看琉璃光菩薩來也如來或現一身或現多身或現大身或現小身或現男身或現女身身上出水身下出火入地如水履水如地乃至樹木山川城邑聚落隨意所現是有相耶是無相耶是非有非無相耶是亦有亦無相耶如來在拘尸那城說入涅槃如來在波羅奈城說不入涅槃畢竟入即是不入即是王老師自小牧一頭水牯牛向東邊去不免犯他國王水草向西邊去不免犯他國王水草不如隨分納些些譬如一室惟有六窗內獼猴外獼猴廝喚廝應即如內獼猴睡著時如何惺惺我與你相見了也盲龜值木香象渡河是恁般人方解說恁般話直得特牛産犢石女生兒且要問你非非想天幾人墮位聻師子咬人韓盧逐塊闍黎顛倒喚奴作郎金鍮不辨玉石不分遠善知識近惡知識箜篌妙音非有妙指終不能發住住住菩薩不修淨土如來不證涅槃于一切法實無所說且道得何三昧耶隨流認得性無喜亦無憂老僧于一切法悉無所見師子吼菩薩品一句道得師子頻申二句道得師子返擲三句道得師子踞地太陽太陽盡情吐露了也云何說法何故說法為誰說法欲知佛性義當觀時節因緣菩薩見性如來見性要見佛性麼無明即是要見無明麼佛性即是舉一不得舉二天台來徑山去來日普請當時還有過麼薄伽梵涅槃門雲門扇子乾峯拄杖有優劣沒優劣勿于中路事空王杖䇿優遊到本鄉汝欲入京朝帝主麼才到潼關切忌退轉是師心者不師于心與天為徒乃名天行木雞啼芻狗吠前中後陰一時打併角生酪耶乳生庵羅耶白犬黑耶雞三足耶丁子有尾耶佛性有佛性無作麼生會看看瞿曇幻術滅沒了也看看婆枳多城拘尸那城師子吼也外道六師同共隨逐誑惑人家男女唯除阿難迦葉諸大弟子所不能曉明中有暗暗中有明暗時無明明時無暗火熱風動水濕地堅四大性復如子得母先以定動後以智拔譬如明鏡照了面像是空三昧是無願三昧是無相三昧見麼見麼諸人但知定業難逃不知定業可壞為壞定業專修道果如何修道果聻有佛處不得住無佛處急走過三千里外摘楊花摘楊華鐘中鼓鼓中鐘諸法不相知諸法不相到見麼見麼羣盲摸象或說似蘆蔔或說似箕或說似石或說似杵或說似臼或說似牀或說似甕或說似繩畢竟不觀全象他過量人一超直入得不退轉雖行畜生行不受畜生報回途入妙與化徂但不見道真師子兒善師子吼麼淨飯王宮分明誕生王子千華臺上分明化生王子如來化生耶非化生耶具眼者辨取迦葉菩薩品是則龍女成佛非則善星墮陷善星比丘是真善知識善說法要譬彼力士能止兒啼滅跡除踪不留影子矮師叔食已還吐芭蕉飲酒羅什吞針一類孤魂燈燈不絶當時生陷地獄在地獄中如三禪天樂如來世尊親為記莂當得阿耨多羅三藐三菩提快哉善星出佛身血無佛無法無有涅槃好瞿曇好瞿曇被他一棒打殺了也四十九年哆哆和和臨末稍頭露些敗缺尋常說善語真語時語義語法語寧說十住退轉不說如來有二種語一總不要信他昨日說定法今日說不定法有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目却是有時揚眉瞬目却不是癡人食唾正如執方療病總不是也有定答有分別答有隨問答有置答汾陽十八問十八答歷歷分明因語耶果語耶喻語耶不應說語耶世流布語耶如意語耶隨自意語耶知麼知麼有無善不善有漏無漏世間非世間聖非聖有為無為實不實寂靜非寂靜諍非諍界非界煩惱非煩惱取非取授記非授記有非有三世非三世時非時常無常我無我樂無樂淨無淨色受想行識非色受想行識內入非內入外入非外入十二因緣非十二因緣說甚有佛性無佛性世智說有我亦說有世智說無我亦說無要知佛性麼佛性是穢惡是不淨是歌羅邏是泡是胞是膿是血是涕唾乃至四攝法四念處四正勤五根五力三十七品助道之法是毒蛇是猛獸是怨賊是利刃乃至六波羅蜜是夢是幻是露是電是陽𦦨是火輪是乾闥婆城是空中花是影是沫說甚八忍八智四果四向四加行下上中上上上天家家人家家釘樁搖櫓刻劒守株一總不唧𠺕漢說甚有離係無離係有等流無等流有士用無士用有增上無增上有異熟無異熟秪益多聞徒為戲論老瞿曇額角空心舌頭不是口裏呼馬應馬呼牛應牛知麼知麼是第五諦是第六陰是十三入是十九界魔說佛說請更參尋學道如鑽火逢烟漫罷休過得荊棘林方是好手末後一著腦後一椎這裏切須仔細大疑大悟小疑小悟不疑不悟不疑者即是疑也莫執著好憍陳如品不問有言不問無言世尊良久外道即悟良馬見鞭影而馳說時默默時說無語中有語有語中無語或歌或舞或哭或笑或罵或讚于怨親所不能分別將謂狂耶謂非狂耶見麼見麼金翅鳥王當宇宙也搏象全力搏兔全力一身作無量身無量身還作一身于自身中作男女身牛羊象馬一耶異耶有問有答蓋是尋常用處不換機師兒返擲借婆衫子拜婆年高處高平低處低平如是如是一切諸法皆幻化相切莫鉢盂安柄沙裏尋油風動耶幡動耶本所不知本所不曉如來世尊一則默然再則默然三則默然推聾粧啞不是好心直得鼓粥飯氣說許多般檢點將來過犯山嶽當時若干外道各逞異端惟有犢子梵志言下知歸與他紙衣道者把手同行猶較些子皮膚脫落盡獨存一真實是果然麼也奇怪也奇怪阿難于娑羅林外十二由旬為億萬諸魔所共嬈亂魔說種種佛說種種有差別耶無差別耶和尚門庭高峻侍者邊得個入處鹽官扇子鳥窠布毛國師三喚耽源三應互相鈍置了也老瞿曇念念有詞令他須跋陀羅得甚麼第一義空出甚麼非想非非想處箇事且置慶喜慶喜汝是如來最小之弟尋常涕淚悲泣哭個不休今正當二月十五大限到來分離頃刻不立一問不措一詞是何道理見麼見麼會中無數菩薩無數衆生入大涅槃一時死却了也畢竟如來般涅槃聻不般涅槃聻切忌道著涅槃後分東瓜直儱侗瓠子曲灣灣如來世尊鼓兩片皮嘮嘮叨叨臨行之際說不休歇啼得血流不如緘口罷罷罷歸去了罷初生揑怪臨死周遮指天指地目顧四方三十二相八十種好且道有多少長處說什麼紫磨金色之身瞻仰取足你面皮厚多少去便去住便住二十四反二十七反留留連連命根不斷為著什麼來阿難老昏被他覆蓋亦不覺知如來畢竟涅槃不般涅槃菩薩大衆一切衆生弄得眼花昏暗亦不覺知如來畢竟涅槃不般涅槃隱峯倒化谷泉立化快便難逢雲居臨歿剛道箇祗這是蓮花峯庵主直入千峯萬峯瑞巖主人公如今喚亦不應也大衆看看拘尸那城阿耨達池潤一尺濶一丈東門西門南門北門靈棺自舉陰摩羅鬼惑亂于人不用大驚小怪當時人天衆前拈花微笑正法眼藏涅槃妙心分付摩訶迦葉且待他來且待他來生冤家死對頭不及黃泉難得相見金棺雙足何難拖箇死尸來髑髏眼睛猶帶識在湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識還諦當麼身中吐𦦨足下放光火不能燒水不能滅總不過是遮眼法兒可憐生可憐生一具紫磨金色之身弄得五花星散剛剛留得四箇牙齒又被他捷疾剎羅偷了兩箇連他迦毗羅國本生眷屬不能收取一毫鐵錚錚調御丈夫如今三昧神通都用不著了好笑好笑癡頑俗子治兵相攻爭取舍利這幾點臭骨頭有甚好處若不是大顛明教竭力相扶幾被他韓退之歐陽永叔幾箇酸秀才一時罵倒且要問你丹霞燒木佛院主墮鬚眉疏山塔上龜毛三尺臘月蓮花可曾拾取舍利未大衆還有疑處一般白氎為甚城內人的大都灰燼惟迦葉者火全不燒畢竟紫襴袈裟之外誰是其餘快請道取三經解明智旭解卍云四十二章經略解遺教經解及七大人覺經解之三般合稱三經解既分出別處故省于此
