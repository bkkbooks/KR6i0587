body:
  text: 萬壽俍亭淨挺著長水何元英蕤音曾王孫道扶閲判教差殊問楞嚴一經天台判教列為方等賢首判圓又兼終頓序經者謂圓理圓行圓耶否耶答修證了義非不了義究竟堅固非不究竟台宗判教與華嚴等盧舍那身落第二耶理行並圓開為終頓圓通一門三十二應法華會上異口同宣又問菩薩萬行答戒定慧三及三增進種種是也摩竭全提亦稱六度結界持呪統屬修能但説密因不專持呪科經同異問科經正宗離為五分始從啓請至勝義性為見道分從決定義至説呪已為修道分五十五位為證道分安立經題為結經分人天七趣微細魔事為助道分溫陵長水兩家略同是不易否答原本經題修證雙舉經中明言是見所斷是修所斷有見有修有證是已徵心辨見三科七大含吐十虗獲本妙心得未曾有此時見道了了分明不歷僧祇一生取證願今得果普度恆沙自此以還發願衆生發願證果滿慈再問答正修行性覺妙明覺明為咎審除微細稱此可知如來藏性周遍圓融一多互含大小涉入離即離非是即非即華嚴法界全體無餘如此修證何藉劬勞衣裏繫珠大經同旨正修行路豈有他哉話端不了按下雲頭華屋在前要因門入疏明決定選擇圓通叩鐘綰結旁引曲暢文殊説偈深入一門大地山河忽然不現一生取證不其然耶前悟實相此獲法眼有頓有漸次第宛然後為未來方便申請三無漏學以戒為基持呪結壇種種功德是正修耶是助道耶四十四心五十五位雖與華嚴詳略不同彼此互明皆為證果七趣六道亦槩他經微細陰魔無問自説五濁五陰根本輪回妄想攀緣自取生死示現聲聞重來啓請指修行路不離見聞一生證入如是如是説經時分問五時判教謂説楞嚴在法華後涅槃會前耶輸受記持地證經不唱入滅果可據否答疑者有二法華會上受記宛然自在通王豈入淫室又從記莂遂入涅槃一乘之餘那説方等經不云乎回心向大志行等慈清淨執身不遭淪溺入魔入佛難行能行彼小乘人望而却走畢鉢羅窟體會全經末後提持當機啓請剎竿放倒飲光再傳不可無一不可有二圓耶否耶論者又謂是經所説將不一時彼琉璃王誅滅瞿曇在波斯後是亦不然菩提樹下三七思維煙水百城經歷年歲將一時耶將異時耶牽義拘文難尋妙典如來密因問教分顯密謂修多羅及陀羅尼此説密因當指持呪答欽奉慈嚴將求密義十方咨決恆沙來聚皆謂於此獲妙微密豈指陀羅目為祕藏問宣示深奧所説何法阿難結集何不廣明答當時説法十界普聞若涉言詮已多剩義摩竭國中正令如是更希冥授得無妄耶頂放寶光問佛説神呪頂放寶光觀音大士説圓通門諸佛放光皆從頂出是一是二答飛光以後三度放光一從面門一從𮌎出一從佛頂惟圓通門交光相羅佛佛授手無二無別化佛説呪光從頂生表示其相亦復如是名大佛頂豈偶然耶啓請方便問最初方便方便多門屈曲垂慈理合如是及至後來超出一門一門深入一路涅槃與方便義似相違反答惟一乘實餘二非真方便化城都成戲論深入一門已非超出身出門易門出身難從門入者不是家珍莫錯會好見何勝相問心目流轉眼見空華別指見精見猶離見見有二耶答如病目人見即有眚彼見精者初未嘗眚浮塵勝義有二見耶明不循根無目而見周遍法界莫非見精咄哉阿難見相發心心目為咎佛審其故展轉推窮見非是見見不能及空華瞥地清淨眼開一場慶快妄想輪轉問一切妄想輪轉無窮由顛倒生從堅固滅五濁蓋纏不離五蘊中間復云內分外分純想升天純情墜地想聰情鈍則言想者未盡非耶答積想積情衆生顛倒輪轉三界無有出期黑白升沉無容揀擇末那執受幽隱難銷聲聞辟支未空識蘊四禪八定全屬虗明命根不斷自取輪回望涅槃城遠之遠矣摩頂説經問講堂開豁詞義未終忽舒金臂説三摩提是何意旨答首楞嚴王妙莊嚴路一經標指具足數言錯過此機葛藤難了如大日輪能破全暗如獅子吼能伏百獸如大火聚能燒須彌如金剛劍能斷一切舒臂摩頂當時一口吸盡西江七處徵心問阿難逐妄如來指迷七處追窮必無根本是則是已龜毛兔角既被所訶畢竟此心為在無在答獼猴窺月月未嘗無捉影則非影非真月晴空在眼覿面無他若問空華汝應揑目面門放光問圓融行布百界千如十方微塵合成一界既聞命矣佛頂放光大地不現豈移此土至他方耶抑復平沉空所有也答因明立所大地遷流清淨本然從無起滅圓通證入塵纍銷亡諸有為相自然不現譬如寤時問夢中事為有相耶為無相耶識精元明問識精元明講家謂為阿賴耶識不生不滅與生滅合發起根身及器世界識相既現元性即隱是否答阿賴耶識但名為識不名識精識精見精孤山同釋菴摩羅識是為元明阿賴耶識謂為元明則尚未可世界衆生相續緣起本元明妙豈涉去來能生諸緣不變隨緣緣折遺者隨緣不變本然清淨絶遠攀緣菩提涅槃此為根本若如所云識相現前元性即隱顛倒妄想違彼涅槃豈得指為元清淨體佛咄阿難問佛咄阿難矍然避席馬祖一喝三日耳聾佛祖機緣是同是別答一般機鋒箭刃上事有殺人刀有活人劒具眼者知舉拳屈指問檠拳竪指事本瞿曇有實有權為照為用答止啼黃葉未免婆心作家拈起料撿分明依樣葫蘆遭人怪笑窮子逃逝問窮子捨父喻出法華阿難悲淚引事輸情故知説經在法華後答衣裏繫珠亦同彼喻説經前後不必深窮動地放光異文同指捨生趣生問捨生趣生未免輪轉不生滅地恐不其然波斯何云得未曾有答伽黎誑惑指身後無聞佛慈示悟身後有只此踊躍聞所未聞却復誤謂捨生趣生是不生滅都認識神以為本來喚奴作郎究竟顛倒棄海認漚問山河大地咸妙明心如來藏體開闡略盡何所未明來再叩耶答海即為漚波不名水耽緣失心泥指亡月含元殿裏更問長安八還辨見問見猶離見見無所還一言直指快便難逢胡乃紆回徒致辭費答水落石出春到雪消影草探竿重重拶入心緣路絶貧無立錐似空合空以水涵水見性周遍問見性周遍遠矚塵沙何乃衆生不越分寸聲聞菩薩種種差殊或見初禪或見千界可得聞耶答元明見性洞遠無餘現前差殊修業所發周遍義類在後廣明修業造端於茲略顯自然非彼不見之相問寂音謂為性見清淨但可目見非他能見中峰謂為離物不見本無其相二俱是否答説理轉勝語意不倫經文但云不見若見見相現前豈得復名不見之相蓋不見者非見所及此理本明見非是見見猶離見且待下文方始開顯於一毫端含受十方國土問一毫含受其義云何答須彌藏芥芥內須彌大中現小小中現大如虗空華本無所有問空華本無虗妄不實菩提淨妙圓亘周常見緣想相既屬空華如何復云此見及緣元是菩提妙淨明體答山河遷變豈礙虗空見聞往來不攖湛寂如來藏裏影現空華愚懵無知但勞執捉我真文殊無是文殊問洞山開悟渠不是我我正是渠臨濟提持無位真人面門出入我真文殊無是文殊宗教自懸理難通會答惟有一月厚無第二文殊之外豈更文殊稱理而談一言斯足離魂倩女誰幻誰堅赤肉真人隨出隨入認影迷頭切須仔細洞山過水渠我相逢寶鏡重重非公境界因緣自然問因緣説法排擯自然夙昔闡陳何名戲論答隨宜方便不惜眉毛曳尾靈龜自拂其迹因緣和合燔盡無餘今日舉揚方為了義見見非見問本元見性獨妙真常見見之時何勞離見答本説見精是第二月誠然見見見已銷亡不脛而走無翼而飛返聞自聞知見亡見豈心與目所能及耶諸三摩提問諸佛密義既聞命矣彼説經者謂三摩提亦有顯別阿難所問猶屬小乘如來闡揚方屬圓旨為止為觀科釋不同説偏説全疏指非一是果然否答回心嚮大本叩圓音答在問邊漫勞分別或三摩地或三摩提及奢摩他舉一即是譯文徑省以槩全題摘句尋章是皆逐塊別業同分問妄見一緣何分同別造業之地別具因由受報之時同其劑限先德所釋誠為是否答人迷我迷故謂之同人覺我迷故謂之別妄例妄見本屬隨行妄雜正知遂成獨起見與見緣似現前境問永明長水各自分科元我覺明見所緣眚二句指歸應離應合答順理消文永明為是覺明何眚見緣為眚故下申言覺見即眚覺緣非眚眚即眚明明不為眚所覺雖眚覺未嘗眚覺自離眚覺并知眚前不云乎見眚非病若知其眚眚不為病明暗二性曾兩立耶生滅去來本如來藏問因緣生滅盡屬假名如來藏中本無所有何不直趨無上究竟陰入處界徒此紛紛答不捨一法不受一塵治世資生未違實相當由仁者分別多端于種種邊自生執著彼師子吼何關鐵牛木人無情豈驚花鳥陰入處界問五陰次第識宇難銷處入界三識為之本唯識所變虗妄不真識與見精是一是二答水外無波金非重礦要第九識方名識精非彼賴耶伏藏生滅問全體真如轉識成智何容決擇誰幻誰堅答轉不留情繁興在定雖圓鏡智即此含藏起滅未停不名白淨澄清海體豈外浮漚非認浮漚遂為瀛渤又問本了知性即湛元明咎此覺明因之立所識精微妙不越了知豈是涅槃常清淨體答第二月輪一月所現終不名彼不為月輪因明立所所即妄生豈得罪明并棄明覺決波求水濕性全無不特亡波抑且亡水元明見性具足涅槃是見精微離見分別見精見性問明暗二種發見吸塵見性見精本無自體菩提涅槃誰根本耶答後不云乎根塵同原脫縛無二本一精明為六和合涅槃生死總由六根故選圓通一門深入因緣和合問因緣和合何分四義答因依往昔緣起現前和不中分合尚兩立問因緣種種排擯無餘如來指歸畢將何等答佛説了義如晴明空終不尚留一翳在眼剝芭蕉體中無有堅世巧幻師誰為實法吸撮內塵問離色離相故名內塵為分別影為獨頭意答前塵影謝吸攬中歸雖則依他多由遍計水中像現鏡裏月形當體寂然塵從誰起入處虗妄問入處虗妄自性則無何云如來妙真如性答了知虗妄當體本如且妙真如原無自性第一義諦問第一義諦言説都忘佛祖從來何所標指答如來口窄阿難耳聾楞嚴會中祇得一半問留取一半何不説明答向下文長且待來日七大周遍問七大周遍是義均否答本問四大例及虗空援見與識究極而言兼內兼外有別有總問識性見精何分為二答聽聞覺知都名為見前五照境具顯功能識兼了別傳送含藏總六七八始獲全性前後理殊不妨分顯問畢竟同異答體相雖分指歸無別周遍圓融無有二也問已復圓融何為循業答巨雷驚遠聾夫不聞日輪經天盲人不見騰聲吐曜周遍義均所不見聞斯為循業心遍十方問世間所有皆妙明心石頭大小竹竿短長任舉目前當由此旨答鎮州蘿蔔青州布衫亦是世間諸所有物豈得盡指菩提妙心逐塊韓盧觸途成滯獲本妙心説偈讚佛問得本悟心一生取證發大誓願還度恆沙明是頓超豈復漸詣答涅槃易曉不歷僧祇差別難明更審微細理雖頓悟事以漸除卷末釋成當無匿旨云何忽生山河大地問山河大地次第遷流觀音説通忽然不現或由神力移擲他方抑復遷流有時而滅答彼不現者清淨本然未嘗有生云何得滅遷流終始影現空華目睛不勞華於何有清淨本然問清淨本然山河大地就路還家何等成現世尊當日胡反紆回答黃面老子聊借探竿祖師門庭當頭一擊相逢覿面了無異詞審顧遲疑千里萬里為覺不明稱為明覺問為覺不明吳興謂為覺了無明長水謂為由覺他明溫陵復云性自不明用心合覺未知孰是答求之過深反失語脈經旨若云為指明者名為覺耶抑復不明稱明覺也輕施一拶用勘滿慈故設兩端以為套索無明既乖有所尤錯納成敗闕上我釣鈎因明立所問因明立所疏謂無明織成能所是果然否答眼施金玉為青已多豈待塵沙乃足疵纍因明立所咎本在明若説無明更寬一著彼無同異真有為法問彼無同異真有為法疏謂彼者依賴耶識指現相言吳興又謂無同無異指上所稱蓋無同異與同異相總列為三具有為法兩家孰是答一真法界何異何同世界虗空盡由妄想無同異中熾然同異山河大地從此遷流蓋無同異無為法也熾然同異已屬有為因此復立無異無同四相宛然有為轉熾夢幻泡影莫此為尤顛倒塵勞覺明之咎區區管見無當前賢世界相續問風金火水次第輪成風應在下水應在上相狀何等答準他經説地輪依水水輪依風風輪依空大氣舉之風本在下金質堅礙當在風際另有一輪如崑崙山及七金等不指地也火光上騰蒸濕為水氣呵液結甑蓋汗流故大海中常有火起世界安立次第本然問覺明堅明搖明寶明四輪相依以明立體明為之咎不待言矣若遺本明滅除世界虗空莽蕩豁達無歸未必如來遂所稱允答丘陵坑坎不異黃金寶樹幡幢何非雲影飛光按指豈待滅除忉利菩提別成世界如來藏裏周遍圓融地水火風皆歸實相遷流妄想豈盡然哉明理不踰問明理不踰疏謂真明妙理是否答因明立所見妄相成明理所知不越分寸見不超色聽不出聲種種是也若復謂是妙理真明何得更説覺明為咎流愛為種問種之與胎作何別白答種謂識神胎指形質愛根遷流織成種子妄想納受結為胎元無始分段識神先來當體出生形質伊始有為習漏何當復生問習漏已盡大地平沉請為如來代一轉語答瞿曇當日不消道個我不見有大地山河水火凌滅問水火虗空不相凌滅觀相元妄觀性元真復云何説是圓遍義答相非性外因妄顯真性在相中依真立妄竹密流水山高白雲法界本寬何疑圓遍離即離非是即非即問毛端寶剎微塵法輪自他不隔一多互含當是華嚴無礙境界答摩竭掩室不勞佇思淨名杜口漫容比擬離即離非是即非即且與老僧過拄杖來三緣三因問三緣三因長水謂是或殺盜淫三之助緣溫陵又謂世界衆生業果相續吳興則云欲貪三種明是所因助殺盜淫種種緣起未知孰是答世尊現説殺盜淫業三緣斷故三因不生取證經文吳興理勝問緣是所造因是能造所反屬先能反屬後於義何準答因緣互生本無前後執身不受執意不行緣斷因銷能所雙遣菩提心生生滅心滅問用真遣妄不名本然有照有覺俱為障礙曹溪亦云菩提無樹意謂此耶答無功用道本絶名言北秀南能漫勞頻舉雖獲大宅要因門入問歸元無二方便多途一路涅槃遵何戶牖答門門善財處處彌勒不消彈指樓閣斯開彼過量人豈由門入開無上乘妙修行路問修行圖藉次第宛然教外單傳似疑徑省答為二乘人及末法衆開示化門非第一義三乘權學一念頓超不歷僧伽豈由漸次五濁次第問五陰根本五濁因之誰當其先誰當其後答緣染之入色陰最先銷滅之餘命濁最後其驟接者其感已粗其障深者其習尤勝湛旋虗妄得元明覺問五陰滅生從無實體云何旋湛得契如來答初伏煩惱次斷無明但去泥沙不除其水水性自清塵土故濁若無塵土水自澄泓惱煩根本問煩惱緣起在五濁中云何復開二決定義答初援五濁為斷無明次選六根為求深入煩惱重濁最障性修故勑圓通鏤其根本六湛圓明問六湛圓明隨處可入云何獨選耳根得通答六解一亡互融勝妙觀音入理此方應機故涅槃門耳為殊勝見斷修斷問塵沙無明粗細殊等見斷修斷分劑井然非可顢頇一生取辦答無明積劫石鞏頓消百千法門水潦驟悟一生證入豈遂無人苟不其然修途難昧六根互用問無目而見無耳而德吼月泥牛嘶風木馬想亦如是答以蠡測海徒益自勞以籌算沙終恐未盡依通解會轉見難堪佛法不是這個道理將誰立因求無上覺問撥無因果殃禍所招慶喜一疑不為無見答抱橋洗澡鈍置殺人莫怕落空落空不惡羅睺擊鐘問拈捶竪拂照用齊行羅睺擊鍾後來依樣答宗門大用軌則全無莫謗如來便為戎首我有一棒要打羅睺不合當時隨人使喚普佛放光問放光灌頂於時妙法曾不宣揚云何大衆得未曾有答才涉言詮便成剩法諸佛頂相本所不見本所不聞今此會中光光相羅以頂灌頂大佛頂義覿面分明塵説剎説當無有間根塵同源縛脫無二問生死解脫總由六根云何證知顯不二法答聞聲悟道見色明心無明涅槃不爭分寸知之一字衆禍之門白牯黧奴許伊話會陀那微細常不開演問阿賴耶識一分是真一分非真於義果否答真與非真是兩頭語前不云乎妄真同妄離真非真如何更取此義纏擾佛旨蓋云若説是真若説非真總恐成迷故不開演截取兩頭離言説相大圓鏡智即阿賴耶無明涅槃非有二也非幻成幻問云何自心復取自心非幻成幻幻于何立答心本非幻亦復非真若執自心塗汙不少何況于中更生取著渴鹿求𦦨不大妄耶六解一亡問六解一亡非一非六頓漸次第如何指明答一尚不立六云胡生當體全超本無倫次若須選擇六受用門綸結宛然因次第盡退藏密機問密言密機是一是兩答此經標首謂之密因密在汝邊言詮莫及退藏領納是第一機前此披陳已為剩説憍陳那等各説圓通問各證圓通從無優劣何勞選擇獨事耳根答深入一門音聞為最自餘方便七大圓融處入界三本如來藏故各各説盡圓通門識心圓明入圓成實問三界萬法唯識唯心慈氏圓通何反不取答依他遍計三性宛然但可條分未為最上華嚴六相雖定宗乘慈氏門風尚需一劫都攝六根淨念相繼問觀音勢至分座蓮淨土一門豈非上乘答隨其心淨佛土自淨六根攝入已證圓通但此想因未能離念豈如亡所聞盡覺空從聞思修入三摩地問達耳謂聞著心謂思治習謂修名為三慧準瑜伽説聞屬三賢思判加行修成十地二者孰是答雖稱三慧統貫一門聞性圓明曾何漸次有初有漸但於聞中先後涉入層梟而言不必裂段擬合思修彰三慧名失一門解入流亡所問入流成覺前有偈言此云入流應無二義答準雲棲解入法性流如偈所稱返聞自性生滅既滅寂滅現前問入流亡所是聞聞理聞所聞盡聞不聞理覺所覺空不聞聞理空所空滅不聞不聞於理是否答説理即得寂滅現前更是何理問者一喝答老僧耳聾聞熏聞修金剛三昧問熏是熏習修是修證現取音聞何稱如幻答聽不以耳亦不以聲幻法幻人離情絶謂覷驢覷井同道方知不是目前音響所及三十二應問本菩薩身三十二應為是報身為是化身答如水中月應物現形報化非真是名如幻十四無畏問無作妙力施與無畏事類相感得思維否答觀音入理各以類求無畏功德亦以類應離目坎耳不熱不濡慈能止殺空能銷堅明能破暗根身圓淨誰作賊媒塵境全除不亡何待權實二智成女成男福慧並圓一多互攝表此義類理事相符故與衆生合其悲仰四不思億問頭目手臂影現衆多如響應聲有感斯赴為神通耶為法爾耶答持名誦呪總屬音聞八萬四千尋聲赴感莊嚴勝淨微妙難量擬議推求固所不逮大地山河俱時不現問萬象森羅云胡不現答一時清淨寶網交光大地山河何從安著問梵唄自然憑誰宣説答妙音圓遍彌亘十方耳入通玄理合如是文殊説偈問耳根證入契理契機捨觀音門豈無方便答二十五行觸處現圓官不容針私通車馬聖性初心問聖性初心云何分別答彼聖位中逆順皆通二十五門何勞選擇初心方便遲速不同清淨音聞淺深懸契安立道場問道場莊嚴表何勝相答悲念末法度彼沉淪故此攝心理事兼舉三無漏學問淫怒癡性即是佛性何三無漏以戒為基答增上慢人作過量語非毀禁戒祇益自欺毗奈耶法根本最先定慧義兼故不重釋淫妄愛見問愛見同坑淫妄何別答淫由愛生妄逐見起以是兼説愛見成河結界持呪問十方諸佛同一呪心惟此密因將為無上答陀羅尼義不可思維觀音妙力説種種呪現種種相等無有異四十四心問一生取證不歷僧祇云何復問增進漸次答信住行向并十地名摩竭會中原所演説始從兜率暨升妙光是一生耶是纍劫耶衆生世界問衆生世界前已略言此復繁稱旨歸何屬答將明等妙先釋衆生生佛同原本無差別此有所有非因所因方位遷流以故合説非真求復問一處休復圓通妙門何乃求真復成非相答才有一毫眼著金屑動念即失舉心即乖窮十二變問六境六情旋流不止云何修證還得出離答因聲有色因動有聲聲不自聲誰為動者刳其正性問云何漸次刳其正性答衆生淫欲而正性命斷除三毒淫為最先即獲無上問違其現業即獲無生乾慧以前便齊八地是漸次不答雲棲謂指圓頓行人然約漸次在因地中且待增修後證果位從真妙圓重發真妙問一真法界直入全超十信位中如何重發答自乾慧地已證一真初增信心重重顯發大悟小悟閲歷不同根本智齊乃彰差別回佛慈光向佛安住問信住行向標位各殊云何十信已列住名并回向義答十波羅蜜勝槩全彰如來乘中不妨兼舉回自佛來向從我往交光涉入何所住耶四加行位問天台加行位列小乘云何此經在十向後答彼彰通教此説圓門理非一指詞無定科即小乘名顯大乘法如來逆流菩薩順至問順行而至次歷僧祇如來逆流是名何等答地前諸位以次而遷擬陟修途豈容蹴至如來妙應赴感隨機衣垢脫珍曲垂方便是覺始獲金剛心中初乾慧地問初乾慧地連綴上文撿原疏中指科不合答從初乾慧具足大心歷五十五功行始備位同大覺故名等覺此正所謂金剛後心名大方廣妙蓮華王問稱大方廣原本華嚴妙蓮華王具法華旨經兼二義得此稱耶答天台賢首各定一尊楞嚴會中出門合轍斷除六品微細煩惱問溫陵解謂九品煩惱斷除其六自餘三品佛果全除蓋此已證大乘地位不從欲界前六品也此説是否答審除微細先獲法身豈至今時才登二果頓悟禪那經有明誨溫陵理勝不足疑矣六道七趣問六道七趣本無所有為勝為劣得非妄耶答依世間法安立假名倘未出離升沉宛在想聰情鈍稱此可知生從順習死從變流問儒典所傳遊魂為變此云變流旨頗合否答少壯遞遷皆由順習形哀物變輪轉環流儒佛所稱是皆同旨生死交流輪回不已阿誰取證出此蓋纏有十種仙問遊仙一類不載他經此獨詳明檃括何旨答秦皇漢武本好神仙黃老失傳多溺其説有形終盡去天尚遙倘聞佛言廢然知返問堅固交遘答一身坎離自為牝牡非云金液窮極淫機于無盡中發宣盡性問云何為盡云何無盡答不盡空理故云無盡然已窮空故云為盡于窮空處如存不存于不盡處若盡非盡既已窮空故名非想然不盡空故非非想有無二無無二亦滅問依中道智無二亦無非有非無作何揀別答已離四句不著二邊空色兩亡形言都盡豈諸戲論所能及耶此十方空悉皆銷殞問虗空銷殞世界都忘即此道場何處安立答迷妄成空依空立界或起或靜為異為同既爾發真銷滅自盡別行一路只在目前毫端寶剎微塵法輪惟證乃知非公境界五陰主人問五陰既盡誰為主人強作主人何由陰盡答住名主人理無遷變前云五蘊本如來藏豈彼逃匿名蘊空耶五陰區宇問色為堅固豈有説乎答色塵留礙是堅固義劫有分段刻成形問受為虗明答受由見起仗此虗明察察為知方能領納問想為融通答想濫十方融通三界自生煩惱此為其端問行為幽隱答諸行遷流幽隱難辨剎那起滅是衆生根問識為顛倒答識情顛倒去後來先生死回流命光飄忽問五十陰魔答種種魔事各以類從五陰未空不離五濁得意生身隨往無礙問十身具足乃獲意生受陰乍離何遽得此疏分利鈍是果然耶答譬如寱語中非所期定力現前偶然暫得非謂圓頓已足十身遂與聖賢同證果位説利説鈍經旨未然一倫生死首尾圓照問首尾生死何云一倫答生死遷流都屬妄想一期倫次自為始終想陰既離了知不實此煩惱障應念而空行陰十種問六十二見教相條分今行陰中十種外道無因遍常以及涅槃成六十二疑即此也答準教乘説別有指科總之不離斷常二見今經所説名數相符以此倫彼亦無不可邪魔外道問邪魔外道深淺不同五十種類作何次第答色屬形有易感羣邪受為領納魔入心腑想轉幻忽魔來附人行雖擾動外道幽清識涉勝流直趨小乘如是次第種種不同毫釐有差天地懸隔諸根互用問現前六根互用開合從乾慧地直至如來一生取證經旨合否答六根互用證圓通門五蘊銷亡入如來地前後互顯一路涅槃不歷僧祇如是如是生因識有滅從色除問云何識生云何色滅答命根不斷捨生趣生以致形有由細及粗堅礙銷亡歷受想行次第寂滅從粗入細生自順出滅從逆入理則頓悟事非頓除問理事一揆何分頓漸答因次第盡修證不無乘悟併銷汙染不得分頓分漸非實兩途大修行人理事兼到持經功德問佛説法已較量經功為持一經為轉全藏答依文解會食飯不消故紙堆頭轉多理沒密因了義一句全提首楞嚴王只在這裏
