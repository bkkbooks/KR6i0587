body:
  text: 河渚俍亭挺著苕溪錢江霅川陳贄閱有楞伽王在大海摩羅山中十萬六千鬼神以為眷屬乘華宮殿遊行諸剎諸有所為皆悉殊勝見麼見麼大慧菩薩摩帝菩薩及諸大眾從他方佛土簇擁而來即是諸大鬼神轉腦回頭伎倆施設令彼病者目睹空花他楞伽王搖身一變變作一座寶山遍覆虗空口呱呱的說無數法佛語心為宗無門為法門一口吸盡西江幾多漏洩百八句即非百八句大顛長老提起數珠不勞再說擯出首座喝散昌黎當時多少快便瞿曇大不唧𠺕郎郎當當重下註脚也太無端大眾要知百八句麼以拄杖卓一下云這拄杖子威音以前出生彌勒後來脫化第一世為拘留孫佛第二世為拘那含牟尼佛第三世為迦葉佛乃至最後為樓至佛如來應供正徧知薄伽梵圓覺獨覺定性聲聞不定性聲聞菩提薩埵初歡喜地乃至第十法雲地帝釋天梵王世主魔波旬魔子魔女外道六師飛行地行仙天人阿修羅童男童女淫男淫女乃至五種不男金翅大鵬鳥蟭螟蟲白鶴孔癩狗疥猪臭毛鬼琰魔鬼王種種相種種名種種妄想種種正智種種真如靡不攝受四空處天四禪天上際阿那尼吒天下至七金山際中間山川雲物日月星辰金銀琉璃硨璖瑪瑙一草一木一塵一沙靡不攝受歷盡大千世界仰世界覆世界長世界短世界大世界小世界廣世界略世界有無一異斷常俱不俱世界靡不攝受眼耳鼻舌身意心心所我無我法乃至依他起性徧計執性圓成實性靡不攝受有餘涅槃無餘涅槃分段生死變易生死出胎入胎前陰後陰中陰靡不攝受唯心攝受中道攝受般若攝受第一義攝受三乘一乘攝受世間法出世間法出世間上上法攝受真諦攝受俗諦攝受空攝受空不空攝受如來藏攝受自性清淨心攝受法身攝受報身化身攝受不二法門攝受不生不滅攝受不思億神通三昧攝受三解脫門三無生忍靡不攝受藏識攝受轉識攝受現識攝受業識攝受根本無明攝受性真攝受自性妄想差別妄想積聚妄想我見妄想我所妄想有念無念妄想俱相遺妄想靡不攝受名言習氣我執習氣有支習氣乃至善根習氣教化眾生習氣見佛習氣清淨習氣受生習氣行習氣願習氣波羅蜜習氣思惟平等法習氣種種境界差別習氣靡不攝受菩提身攝受願身攝受化身攝受力持身攝受相好莊嚴身攝受威勢身攝受意生身攝受福德智慧身攝受身識身者識受者識應受識正受識世識數識處識言說識自他差別識善惡兩道生死識靡不攝受由旬攝受俱盧舍攝受弓攝受乃至肘攝受指攝受麥量攝受蝨量攝受蟣量攝受遊隙塵攝受鄰虗塵攝受洛叉攝受俱胝攝受阿庚多攝受乃至阿僧祇攝受夢攝受幻攝受陽𦦨火輪攝受乾闥婆城攝受語言攝受文句攝受醫方技術靡不攝受說甚剎帝利種族婆羅門種族旃陀羅種族甘蔗竹葦禾稻滿中一一佛陀一一達摩一一僧伽無二無別看看拄杖子化為龍去也龜毛兔角當面崔嵬木馬泥牛現前躑躅你諸人還領會麼苟或未然按下雲頭再與你葛藤一上參禪要離心意識參藏識說名心思量性名意能了諸境相是說名為識阿賴耶識紇利陀識質多識牟呼栗多識阿陀那識乾栗陀識阿末羅識阿摩羅識庵摩羅識是甚麼碗第七識恒審思量是末那識五識唯是現量六兼比量非量如來藏藏識如金與環不一不異三十三天有一雜林諸天在此林中都無勝劣能令平等是賴耶識所變現故種子異熟到無垢時成圓鏡智第七平等性智第六成所作智前五妙觀察智又五六為加行智七為無分別智八為後得智牟尼珠人不識如來藏裏親收得在眼曰見在耳曰聞在鼻齅香在舌嘗味在意了知手足運奔知者便是佛性不知者喚作精魂闍黎顛倒喚奴作郎無量劫來生死本癡人喚作本來人泥團微塵金莊嚴具異不異總在這裏陀那微細識習氣如瀑流真非真恐迷我常不開演如何是聖諦第一義目前無聖對朕者誰不識若勝妙若士夫若自在若時若微塵皆虗妄也外道說斷如斷命求活如焦穀芽說三緣和合如壓沙出油皆非其義當知陰界入處本如來藏得如幻三昧者如隨色摩尼隨心量度大隨隨他去曹山隨墮是麼是麼咄錯會了也巨海猛風洪波冥壑珂乳石蜜淡味花果日月光明如鏡現像青赤諸色布彩成形無有定處且與我打破鏡來言說別施行真實離名字但有言說都無實義如何是辨初機句如何是接衲僧句如何是定乾坤句如何是正令行句舌頭上討消息早是錯了也以拂子打一圓相云此是無所有相此是一切諸佛自願處相此是自覺聖智究竟之相盲驢跛鱉堪作恁麼分別無分別切莫妄生分別法身無相祗到得法身邊未是法身體法身有兩般病二種光咸通年前明法身事咸通年後明法身向上事葡萄棚葡萄棚也須好看兔無角不應說兔無角牛有角不應說牛有角懷州牛喫禾益州馬腹脹且不是向上何況其餘因有頓漸緣立宗趣宗趣分矣即是規矩理須頓悟事以漸除利鈍不同南北是一緣起自性即妄想自性妄想自性即成自性譬如依佛即是化佛化佛即是法佛趨人無我趨法無我到第一義不思議地涅槃生死不著二邊說一切法是說兔馬等角聲聞見性如夜見月斷現行無明不斷俱生無明度分段生死不度變易生死堪作恁麼白衣拜相豈足為奇積代簪纓休言落魄一拳打翻黃鶴樓一脚趯翻鸚鵡洲大根利智人一超直入廣額屠兒此是千佛一數闡提有佛性非虗語也汝是甚麼人家男女我是大闡提人家男女噓一聲遂去延壽堂僧頗向臨行賣俏碧巖集中幾成埋沒還知闡提非闡提麼大地山河皆屬妄想真實得的人內外明徹如琉璃瓶不久當得無所有觀相次第建立寶莊嚴華像佛手灌頂如轉輪聖王子朝生王子末生王子誕生王子化生王子內生王子王子能成一國之事還知他來處麼如來色像隨類影現譬如眾色如意寶珠普現一切諸佛剎土非有非無說有是建立法說無是誹謗法趙州老漢舌頭不在口裏有業識在知而故犯太煞占便宜韓盧韓盧切莫逐塊夜來好風夜來好風吹折門前一株松吹折門前一株松似水投水以空合空相空性自性空行空無行空一切法離言說空第一義聖智大空彼彼空明知生是不生之法為甚麼却被有生之所流轉監院房典座房莫契證得麼山前檀越家變一頭水牯牛上寫溈山僧某甲喚他作溈山即得喚他作水牯牛即得意生身意生身向不變易處去去亦不變易也披毛戴角殺人放火是大脩行人非因非緣非相非合是真實空惟假名稱妄想攀緣無有是處以言遣言以楔出楔言說妄想不顯示第一義諦相言說夢言說過去妄想計著言說無始妄想言說知麼知麼離四句絕百非老僧今日牙痛不能為汝說藏頭白海頭黑且作麼生參畢竟如來禪祖師禪差別在甚麼處十方薄伽梵一路涅槃門拄杖子是有差別是無差別也大奇也大奇無情說法不思議三種病人善說法要汝不患盲麼汝不患啞麼汝不患聾麼有時教伊揚眉瞬目有時不教伊揚眉瞬目顧鑒咦慣作賊普賢國土瞻視非常蚊蚋蟲蟻無有言說而各辦事如彼恒河餓鬼不見非恒河咎汝倒我倒西院錯從錯即心即佛非心非佛大唐國裏覓一個不受惑的人了不可得觸不得背不得惑亂了多少人即彼惑亂成彼大覺是惑亂不是惑亂句到意不到意到句不到意句俱到意句俱不到探竿耶影草耶照耶用耶非彼癡人之所能知有權問有實問有心行問有故問有置問有直答有反答有分別答有置答汾陽汾陽一總蛇蛇添足了也寧說阿羅漢有三毒不說如來有二種語阿羅漢即非阿羅漢阿那含即非阿那含須陀洹即非須陀洹斯陀含即非斯陀含火熱風動搖水濕地堅固四大自復如子得母五濁五重一時粉碎以如來藏入眾生身是名意生身也不般涅槃非不般涅槃轉識滅藏識不滅離一切妄想無分別性妄想無性惟一乘法分別說三如何是大乘井索如何是小乘錢貫如何是法身向上北斗面南看說甚麼初地二地三四五地乃至八地以上得覺法自性身得種類俱生無作行意生身非我乘大乘非說非字非諦非解脫非有無境界大闡提人行五無間業不入地獄忽遇本生父母時如何一劒揮盡文殊持刃來逼世尊吾必被害為善被害是有作行耶無作行耶佛過去世作曼陀轉輪聖王作六牙大象鸚鵡鳥作釋提桓因善眼仙人迦陵頻伽六十四種梵音一時宣暢有所說法耶無所說法耶有無二邊皆是餘習寧起我見如須彌山於法不說斷滅相說有我者即非有我說通宗不通如日被雲籠宗通說亦通如日處虗空通宗通途挾帶挾路寶几珍御非寶几御珍也黧奴白牯非黧奴白牯也相平等性平等人平等法平等婆婆和和有句無句云何語耶云何義耶一切智智清淨無二無二分無別無斷故生滅是識不生滅是智墮有無是識超有無是智長養是識非長養是智礙是識無礙是智和合相應是識無礙相應是智得相是識不得相是智採集是識不採集是智有兩樣麼諸人被十二時轉老僧能轉十二時不是野狐精變個恁麼形處轉變相轉變因轉變成轉變見轉變性轉變緣分明轉變所作分明轉變事轉變你是何等外道耶五趣相續無有已時相計著相續緣計著相續性非性計著相續生不生妄想計著相續滅不滅妄想計著相續乘非乘妄想計著相續有為無為妄想計著相續地地自相妄想計著相續自妄想無間妄想計著相續有無品外道依妄想計著相續三乘一乘無間妄想計著相續且要問你一念不生前後際斷還相續也無但能相續名主中主是相續義是解脫義聖智見性凡愚不見性聖智無性以對凡愚說聖智性耳三世諸佛不知有黧奴白牯却知有知有却不知有不知有去成知有一切法不生不應立宗木人運步石女懷胎是生義是不生義生而無生不是無生而說無生知而無知不是無知而說無知了別前境不名為知於一切處應無所知是名為知何以故無知無不知何以故不可以智知先用後照先照後用照用同時照用不同時奪人不奪境奪境不奪人人境俱奪人境俱不奪皆為四句皆為方便凡愚無智著方便說不善分別自宗四句奈何奈何治世語言外道阿毗曇雜論街譚巷議方言歌曲涕唾欠呻無非佛事雖然雖然世間言論種種不實增長攀緣徙為妄想乃至少有心識流動妄計外塵著賊了也非有非空非說非不說九十六個圓相是九十六種外道非生死非涅槃而彼外道各執一相或以火滅為涅槃或以風止為涅槃或以覺所覺見壞而作涅槃或見常無常而作涅槃或見無相而作涅槃或見有性不壞而作涅槃或見一切法壞而作涅槃或以求那轉變而作涅槃或謂福非福盡或謂諸煩惱盡或謂智慧而作涅槃或見自在無造作眾生虗妄分別而作涅槃或謂眾生展轉生死更無餘因如是計著而作涅槃或言得真諦道自作涅槃或見和合一異俱不俱而作涅槃或計諸物從自然生即執自然而作涅槃或謂能解二十五諦而得涅槃或守護國受六德論而作涅槃或見時節世間而作涅槃或謂性或謂非性或謂知性非性而作涅槃或見有覺與涅槃差別而作涅槃如是等種種外道各執一道生死岸頭不能決了知麼知麼彼涅槃者無生無滅無事無因離攀援出虗偽非常非無常非作非所作非有為非無為非覺非所覺非相非所相非陰非異陰非說非所說非一非異非俱非不俱當知不生不滅是如來異名如來於娑婆世界有三阿僧祇百千名號如水中月不出不入如來於中亦非不現一切脩多羅語言快說不生不滅而此語言都無實義何以故文字性離故諸佛及諸菩薩不說一字不答一字四十九年不說一字將無近佛而謬聽耶老僧拄杖子多少快活若善了知一切法一切地一切相通達章句具足性義彼則能以無相之樂自為娛樂平等大乘建立眾生攝受正法佛種不斷則能了知殊勝入處常得化生十自在力現眾色像如實說法知麼知麼化生王子踏毗盧頂上行分身揚化遍十方剎所以不是外紹不是臣種知麼知麼第一義諦離言說指彼諸外道說不生不滅者一時二方三虗空四微塵五四大種六大梵天七勝妙天八大自在天九眾生主錯錯錯是生耶是不生耶是滅耶是不滅耶十二因緣內外無鈎鎻明貪愛地水火風假合而成二俱不實我說不生不滅與外道異世間法是無常真如是常世間法是常真如是無常有常無常皆為戲論十地等法皆為戲論七地菩薩入滅盡定聲聞辟支佛不入滅盡定而第八地亦不滅受而取證者得耶不得耶夢中度水未度而覺覺已思惟為正為倒虗妄分別說十地法第一義中無次第相續說有十地法也云何虗妄云何虗妄分別無明住地與七識俱如海浪身長往不斷然是藏識本源清淨庵摩羅識是白淨識亦即是陀那識非分別非不分別是中無實無虗喚做如如早是變了也渠不是我我正是渠應恁麼會方契如如洞山過水逢渠是什麼人境界達摩老齒不關風眉毛不在眼上世尊所說句有開句有遮句有權句有實句有了義句有不了義句有滿字句有半字句有初句有中句有末句當善思惟莫如說受諸恒河沙我說非沙非沙說沙非喻說喻你諸人可曾會麼一切法不生是說剎那義一剎那有九百生滅一念中有九十剎那一日一夜六百四十八萬剎那剎那剎那念念變滅然雖如此剎那者隱覆說耳剎那非剎那而諸凡愚所不能覺古者道剎那便去時如何逼塞虗空作麼生去逼塞虗空不如不去還免得他過失麼六波羅蜜十波羅蜜第一波羅蜜即非第一波羅蜜心佛眾生三無差別何有眾生而不成佛道耶十方世界作魔王者多是住不可思議解脫菩薩魔之與佛有異耶無異耶六識七識因中轉變五識八識果上圓成萬法唯識三界唯心法眼一宗猶在食肉斷大慈佛制不得食肉象腋經大雲經央崛摩經並說不得食肉央崛本一切世間樂見上大精進佛示現凡夫托至長者家值有產難往問世尊世尊云我從賢聖劫來不曾殺生是何意旨華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領大慧謂是金矢法在易噬嗑之頤其繇曰噬乾胏得金矢又之尤妄其繇曰噬乾肉得黃金如何如何佛語心為宗無門為法門從門入者不是家珍這裏作麼生入拋拄杖左右顧云楞伽王過去了也百八句即非百八句有句無句如藤倚樹樹倒藤枯句歸何處畢竟句歸何處聻參雲溪維摩饒舌序維摩一默頓覺三十二義同旹光𦦨默然處維摩先已逗漏不少何處更容饒舌耶雖然說即默默即說三十二大士廣長舌都盧在維摩口中維摩居士廣長舌却在我俍亭和尚口裏所以他經有密語此經無密語默然處說陀羅尼已竟業為俍和尚明眼道破矣知麼知麼兩口一無舌我法妙難思讀是編也謂為密語也可謂為饒舌也可謂為默然也可秀州法弟沈廷勱盥手敬題
