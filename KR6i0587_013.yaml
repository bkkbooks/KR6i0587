body:
  text: 古法華山僧伽淨挺著臯亭鶴山道人王益朋始寧且庵禪者顧豹文閲問蓮華未出水時如何答云蓮華問出水後如何答云荷葉於此會得則襲襲香風涼生殿角吹去萎花更雨新者一剎那間說法已畢可笑他黃面老子費盡許多神力說法華經文殊牽犁普賢拽耙駕著一匹大白牛引動他許多天子天女情與無情人非人等聽得耳熱看得眼花一家有事百家忙大樂說菩薩智積菩薩藥王菩薩藥上菩薩彌勒菩薩勇施菩薩得大勢菩薩宿王華菩薩上行意菩薩莊嚴王菩薩無盡意菩薩觀世音菩薩華德菩薩或有說或無說拖拖扯扯扶起破沙盆於其中間喜得不曾說著一字且道如何是法華經若說四諦法尋常為聲聞人說過的非法華經若說十二因緣法尋常為辟支人說過的非法華經若說六波羅蜜法尋常為菩薩說說了又說亦非法華經若謂眉間白毫放光頂髻放光現廣長舌相上至梵天是說法華經尋常舍衛國裏白鷺池邊時時出現也是除夜舊門神一總沒交涉若謂入於三昧默然不動止止不說是說法華經這個越發是摩竭國中現成圈繢有甚希奇恁般賣弄是了是了佛不云乎如優曇華時一現耳世尊不起於座天雨曼陀羅華曼殊沙華說法華經已竟也未必然須菩提宴坐帝釋雨華此土華林園中天雨金屑寶花不聞是說法華三昧這不是那不是畢竟如何是法華經呀呀呀錯過了也去年今日此門中人面花華相映紅人面不知何處去桃花依舊笑春風耆闍崛山好個消息說無量義經入無量義處三昧此世界他世界今世界古世界攪做一塊混做一團不消雨華不消放光人人鼻孔朝天個個腳跟著地盡大地一切衆生一時授記作佛了也乃往古世妙音菩薩得妙幢相三昧法華三昧淨德三昧宿王華三昧無緣三昧智印三昧解一切衆生語言三昧集一切功德三昧清淨三昧神通遊戲三昧慧炬三昧莊嚴王三昧淨光明三昧淨藏三昧不共三昧日旋三昧總不出此無量義三昧當爾之時文殊師利法王子斬關而入掀倒禪床喝散大衆馬祖升堂百丈卷席不為分外待他老瞿曇粧模做樣放出一道白光射東方小小國土撒泥撒砂堪作甚麼十方齊擊鼓十處一時聞何不放他百千萬億寶光射遍百千萬億塵沙諸國可可的射到東方堪作甚麼諸仁者莫眼花麼曼殊童子隨邪逐惡說許多般屋裏販揚州赤土塗牛妳妙光菩薩七佛之師果然果然爭奈瞿曇面前出一個女子定不得日面佛月面佛日月燈明佛都在他老瞿曇面門出入乃至百千萬億文殊在在處處遍滿恆河喚那一個作曼殊童子然燈老古錐也在他家屋簷頭下過來如法王子受灌頂位八王子十六王子歷歷分明洞山五位王子煞有來由從這裏去知麼知麼如來為一大事因緣出現於世開示悟入佛之知見種種方便譬喻言辭而為說法第一希有甚深難信之法惟佛與佛乃能證知增上慢人不堪任受五千退席退亦宜矣長老舍利弗抖擻精神承當個事取鉢袋來取火來瞎驢滅却若是個皮裏有血的決定不入這個保社爭奈他智如鶖子忍俊不禁大踏步向前道今日乃知真是佛子從佛口生從法化生頭上寶華冠是脫不去的了十大弟子舍利弗智慧第一迦葉頭陀第一須菩提解空第一目連神通第一迦旃延論義第一滿慈說法第一阿難多聞第一羅睺羅密行第一一總成就了也惟有優波離阿那律不在其內總而論之舍利弗等是化生王子文殊師利法王子等是誕生王子然燈佛等八王子阿閦佛等十六王子是內生王子五百羅漢學無學人是朝生末生王子分內紹外紹別臣種王種不足疑矣惟一乘法分別說三有頓有漸緣立宗趣是一是二雪山産大白牛食其糞穢能已諸疾車若不行打車即是打牛即是三界無安猶如火宅出火宅坐安車大丙為御七聖同途朝發崑崙夕遊天門莊周屈平莫謂不道如來等慈視諸衆生正猶一父之子有大家業須付其人挂敝由來顯妙傳糞掃堆頭𥗋𥗋實事當日飲光尊者在百萬人天中破顏微笑正法眼藏涅槃妙心已將徹過一邊家醜外揚又是重新提起龍王一味普雨所潤不同文殊令善財採藥信手拈來總只一相一味之法傳金欄袈裟外倒却門前剎竿從此祖禰不了冤有頭債有主十六王子一名阿閦二名須彌頂一名師子音二名師子相一名虗空住二名常滅一名帝相二名梵相一名阿彌陀二名度一切世間苦惱一名多摩羅跋旃檀香神通二名須彌相一名雲自在二名雲自在王一名壞一切世間怖畏二名釋迦牟尼八元八愷彼彼同時這黃面瞿曇那裏是什麼淨飯王家悉達太子大通智勝佛多年老古錐原來是個不唧𠺕漢一佛出世二佛升天坐久成勞瞌睡還不曾醒一葉落天下秋雷光石火轉個身來受他無央數釋梵天王請說法要默然者久之情知這老漢也道不得及乎一五一十向人天衆前應個時節依舊是趙錢孫李周吳鄭王四諦十二因緣聲聞辟支佛法我道你有多少奇特原來原來有口只堪挂壁被人拶著鼓粥飯氣轉見不堪他於法一切不受的人略有些子衲僧氣槩休休休請過一邊推爺向裏頭去見麼見麼他這十六個不孝闡提之子一哮吼時祖父俱盡轉輪聖王妙德尊寰宇高明朗太虗不是小可的也只得忍氣吞聲同他一班沒意智的人眼睜睜好看古人道同時不識祖這裏還理會得麼他寶鏡三昧分明道個子順于父又道是寶鏡堂前轉身就父為甚麼日月燈明佛口如匾擔大通智勝佛手似擂椎都讓他八王子十六王子出向人前之乎者也不見道還鄉盡屬兒孫事祖父從來不出門譬如王子能成一國之事法爾如然不可強也才到化城未為寶所波羅蜜波羅蜜過一程又一程那邊更那邊未是到家田地如何是到家田地聻客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉辛辛苦苦五百阿羅漢二千學無學人齒落髮白斷送了一生也指望個出頭日子罷罷將錯就錯一總發付了他牟尼珠人不識如來藏裏親收得趙州道佛之一字吾不喜聞又道有佛處不得住無佛處急走過三千里外逢人不得錯舉摘楊花摘楊華且作麼生聻迦葉傳阿難阿難傳商那和修如是乃至優波毱多提多迦彌遮迦馬鳴龍樹西天四七東土二三和他天台賢首一班義學禪和一個大帽子一齊都下了善男子善女人一針一草一色一香禮拜供養念佛行持一入其中自然開悟譬之鑿井漸入漸深佛言誠實不欺汝也虗空講經無情說法有多寶塔從地湧出贊言善哉善哉急著眼看有者道石言於晉神降於莘禍事禍事還諦當麼離浮圖今現在佛滅度後八萬四千舍利造八萬四千塔一一舍利一一全身佛身充滿於恆沙在在處處築著磕著且往古世劫灰飛盡這多寶佛又不知在威音王已前威音王已後龍龍鐘鐘半死半活六根不具七識不全走向人前討甚麼碗如今人只解道三身一身釋迦佛是報身佛多寶佛是法身佛他方百千萬億是化身佛說此大乘經典三身普會異口同宣現前大衆湧入虗空得未曾有莫錯莫錯眉橫鼻直鵠曰烏玄文殊是文殊文喜是文喜毗目仙人執善財手即自見身遍滿虗空及乎放手原在本處孫行者者行孫老瞿曇使個障眼法兒哄弄人家男女具不要采他只這藍藍縷縷多寶老凍儂也是個魂不散的死漢然雖如此渠不是我我正是渠倩女離魂畢竟那個是真那個是假若人識得只消道個勘破了也此土丘陵坑坎荊棘瓦礫原來是黃金七寶所成我道珊瑚琉璃真珠瑪瑙正是坑坎丘陵荊棘瓦礫有兩樣麼有利無利不離行市老瞿曇却也知非且退身在寶塔中道個老僧罪過貧兒思舊債猛可的想著他惡友太子多生歷劫把髻投衙却也全得他力龍象蹴踏非驢所堪全得他力咬牙封雍齒泣涕斬丁公他提婆達多灑灑落落好個丈夫爭肯受伊囊藏被蓋待世尊入地獄我乃出地獄幾乎錯喚你做魔王男兒自有衝天志不向他人行處行切忌切忌他龍女八歲竟往南方世界成等正覺且道承誰恩力老瞿曇好不耐煩終日口巴巴的授記作佛待未來世待未來世有甚了期這小妮子獨步大方如壯士展臂不藉他力曼殊童子因風吹火借婆衫子拜婆年也只解看舍利弗舍利弗當日毗耶會裏遇月上女失却一機如今又來納些敗缺靈照一個籃子從他尸陀林中七賢女處傳授將來與伊凌行婆俞道婆燒庵婆子偷笋婆子臺山婆子鄂渚婆子一類倚草附木之魂成羣逐隊走也若到老僧手中和他八歲小女兒在無垢世界喚將轉來貶向鐵圍山去他波闍波提比丘尼耶輸比丘尼看得眼熱思量奪市搶行釋迦老子硬如生鐵軟似綿團便不違所請莫不是虗妄授記麼見道容易守道難道人行處如火消氷卒難近傍不是與人難共住大都緇素要分明除二時粥飯外是雜用心于法不得放逸不戲論說法平等說法不多說法方便隨宜說法誓不為小乘人說法四十九年不說一法如髻中珠不妄授人如來為一大事因緣出現于世時節若至其理自彰現前異類諸衆生等鬍張三黑李四東村王大姐間壁小二哥十字街頭廖鬍子和他燈籠露柱凳子香臺壯丹花木犀花石敢當癢和子猫兒狗子蚯蚓烏龜𧏙蜋蟭螟乃至一絲一粟一色一聲頭頭上顯物物上彰三十二相八十種好所在圓成不移而具如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊吾今為汝保任此事終不虗也快哉快哉百千萬億諸菩薩等在於娑婆世界之下虗空中住今悉夾集撞頭磕額是處産芳草滿街皆聖人有甚疑惑住住住耆闍崛山在王舍城中佛最後說法將次涅槃這年歲是有限的屈指算來也不多幾日動云五十小劫六十小劫欺誑誰來當初在木菩提樹下三七思維開口便經塵劫恐人不信却道無邊剎海自他不隔於毫端十世古今始終不離於當念如今從直供招謂祗如半日祗共彈指這也罷了却又道從生至生我實不死趙人欒大燕人李少君方士徐福大言不慚丫角女子白頭兒此則難信乘白象降王宮豈不是生露雙足出金棺豈不是死那知他雲駛月運舟行岸移旋嵐偃嶽而不動江河競注而不流日月麗天而不周野馬飄鼓而常靜東湧西沒捨身現身如世良醫憐子失心實未嘗死而謂已死移山門入佛殿舉芥子內須彌三腳驢子弄蹄行兩個泥牛鬬入海鉢裏飯桶裏水未為奇特盡大地是一卷經盡大地是一隻眼以如是眼持如是經出息不入衆緣入息不居陰界常轉如是經百千萬億卷有麼有麼財法二施等無差別莫更向這裏下得一轉麼啞人解語聾人解聽枯木裏龍吟髑髏裏眼睛論什麼八百功德千二百功德楞嚴會上也不較多這裏重來著楔睦州問陳操尚書見說尚書看法華經經中道治世語言資生産業皆與實相不相違背且道非非想天幾人墮位只此一問他陳操尚書目瞪口呆還說什麼六根清淨雖然雖然我不敢輕于汝等汝等諸人終當作佛往昔劫中然燈佛為王子時我為常不輕菩薩每向人作如是說呀呀話墜也話墮也舌頭不在口裏出廣長舌相身諸毛孔放百寶光如帝網珠光光相入翣時之間十方世界通達無礙如一佛土此土他方不容揀擇十方無壁落四面亦無門上至有頂下至阿鼻有多少隔礙琉璃古殿照明月三更不借夜明簾諸人曾見麼衆生界盡衆生名字悉空都來總是菩薩了摩菩薩頂授記說法祗說這個法於其中間不一不異爾時十方諸佛各還本土天是天地是地山是山水是水你是你我是我大抵還他肌骨好不搽紅粉也風流一期佛事約莫成辦了也却有一段菩薩因緣不曾說破藥王菩薩於往古世得現一切色身三昧燒身燒臂供養如來大死却活無手人行拳是和身拶入的一個樣子阿逸多阿逸多號為求名相去多少如今還有恁般人麼無志之徒自甘退屈南天台北五臺踏翻許多州縣向外尋求驀地歸來眉毛只在眼上我此道場巍巍堂堂文殊已擎香水去普賢又負淨瓶來過去七佛與未來千佛在拂子拄杖頭過東過西奔走聽命頂門上一道寶光直射梵天飛過威音那畔重重無盡主伴交參他妙音菩薩分明向娑婆世界按下雲頭稽首作禮三萬二千師子之座維摩丈室不迫不隘何況於今諸仁者莫自退屈彼既丈夫我亦爾爾娑婆世界七寶莊嚴攝入三千大千十方諸佛一切國土十六王子一時作佛奔走輻輳齊至娑婆低頭合掌他黃面瞿曇口喃喃道渭城朝雨浥輕塵客舍青青柳色新勸君更盡一杯酒西出陽關無故人我為法王于法自在這普現色身三昧比比皆然非菩薩非不菩薩大衆莫退屈好華德菩薩在過去雲雷音王佛前夙植德本於今分身無數遍十方剎不可思議觀世音菩薩過去正法明如來其隱自在神足之力亦分身無數遍十方剎不可思議或現辟支佛身或現聲聞身乃至或現天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身頭長三尺頸濶二分夜叉心菩薩面木雞啼午夜芻狗吠天明切莫正眼覷著大事因緣一時了畢如來尋常說法即說陀羅尼謂為密部使人受持今日倒行此令菩薩乃至諸天鬼神鬼子母撥動琵琶共歌一曲見麼見麼鴉之嗚嗚鵲之唶唶吽吽吽咩咩咩一齊演出且道滯羸尫藤林荒禪子訝中眉垂是密部不是密部藥王藥上身上出水身下出火身下出水身上出火大中現小小中現大入地如水履水如地你諸人莫作奇特商量麼日月燈明佛雲自在王佛娑羅樹王佛一佛二佛三四五佛直說到樓至如來有甚麼限說得一丈不如行得一尺說得一尺不如行得一寸文殊智普賢行如車二輪如鳥二翼這普賢菩薩是少他不得的東震旦國有人親見普賢綰雙髻持梵夾法華會上普賢後來乘六牙白象說陀羅尼畢竟普賢毛孔是多少大爾時世尊與多寶佛在寶塔中同聲唱言久默斯要不務速說時多寶塔忽然不現天山雪後海風寒橫笛偏吹行路難磧裏征人三十萬一時回首月中看涅槃末後句序澐篤信佛但不事參學不持齊戒不誦經典更性懶識字半生讀論語一節大學兩節中庸一章至今猶未了若十三經草一史諸子文集堆積几案便睡去夢為胡蝶不知其所之自信與書卷無緣每聞禪家不立語言文字心竊慕之間讀心經壇經則色喜以其簡而易盡若楞嚴法華則便不敢開卷偶閲教典成唯識論不及三行頭疼三日不休後因先人以雪庵心嗣臨濟法寓天台之豐干亭澐往省侍令參柏樹子句七日夜睡不得寧究竟了無所益始知此道不與子而與賢遂不復留意迄今流浪二十年且老矣見海內法席如林一時慧業文人逃名上士咸借以自寄擎拳竪指示衆普說拈古頌古續五燈而傳者其書且汗牛充棟嗚呼人生幾何又復堪此耶聞之先儒有訪友見佛像者瞿然便出或以禪悅辟之淫聲美色澐是以年來學辟佛將以謝禪侶之相難也雖然見性明心自是學人本等語小語大成己成物明明大道豈能昧却乃頃謁俍和尚於水西談笑歡洽間忽出涅槃末後句相示嗟乎嗟乎婆心辣手遂至此耶開示耶勘驗耶逼拶耶對癡人說夢捧讀一過墨汁裡洗炭何從著語勉作頌言切莫使明眼人從旁覷破頌曰生死大事這因緣涅槃末後何須句如來迦葉度衆生位育中和是壽量至誠無息純不已便是金剛不壞身大人不失赤子心臨入滅時還囑付鳶飛魚躍風雅情塵埃野馬蒙莊語孔顏樂處今仍在拈華微笑接綱宗若是句中還著句輪回永墮百千劫吳江後學趙澐謹識
